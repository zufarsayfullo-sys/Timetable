<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Group Schedule Manager | Live Attendance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f1c 0%, #0f172a 50%, #0a0f1c 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        .app {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 24px 32px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.15);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            color: #10b981;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-top: 24px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .stat-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .stat-icon {
            font-size: 28px;
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: white;
        }

        .stat-label {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 4px;
        }

        /* Day Cards */
        .day-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .day-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(59, 130, 246, 0.02));
            border-radius: 24px;
            padding: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(59, 130, 246, 0.2);
            text-align: center;
        }

        .day-card.even {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(245, 158, 11, 0.02));
            border-color: rgba(245, 158, 11, 0.2);
        }

        .day-card:hover {
            transform: translateY(-4px);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(59, 130, 246, 0.05));
        }

        .day-card.even:hover {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.05));
        }

        .day-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }

        .day-card h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .day-card p {
            color: #94a3b8;
            font-size: 14px;
        }

        /* Group Tabs */
        .group-tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 28px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .group-tab {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .group-tab:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .group-tab.active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-color: transparent;
            color: white;
        }

        .group-count {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
        }

        /* Action Bar */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 28px;
            border-radius: 40px;
            color: #e2e8f0;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        /* Table Container */
        .table-container {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 20px;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .attendance-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 800px;
        }

        .attendance-table th {
            background: rgba(0, 0, 0, 0.4);
            padding: 16px 12px;
            text-align: center;
            font-weight: 600;
            color: #cbd5e1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: sticky;
            top: 0;
        }

        .attendance-table td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .student-name-cell {
            text-align: left;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.2);
            position: sticky;
            left: 0;
        }

        .attn-btn {
            padding: 6px 14px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            margin: 2px;
            transition: all 0.15s;
        }

        .attn-green { background: #00B050; color: white; }
        .attn-yellow { background: #FFC000; color: #1e293b; }
        .attn-red { background: #dc2626; color: white; }

        .action-icon {
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 16px;
            padding: 6px;
            margin: 0 4px;
            transition: color 0.2s;
        }

        .action-icon:hover { color: #3b82f6; }
        .action-icon.delete:hover { color: #dc2626; }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: #1e293b;
            border-radius: 28px;
            padding: 32px;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-content h3 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 14px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 24px;
            border-radius: 60px;
            background: #1e293b;
            color: white;
            font-weight: 500;
            z-index: 1100;
            animation: slideIn 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #64748b;
        }

        .fab-add {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none;
            border-radius: 60px;
            padding: 14px 24px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
            transition: all 0.2s;
            z-index: 100;
        }

        .fab-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(59, 130, 246, 0.5);
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .day-cards { grid-template-columns: 1fr; }
            .app { padding: 16px; }
            .header h1 { font-size: 22px; }
            .fab-add { padding: 10px 18px; font-size: 13px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <h1><i class="fas fa-chalkboard-user"></i> Group Schedule Manager</h1>
            <div class="status-badge" id="connectionStatus">
                <i class="fas fa-circle" style="font-size: 8px;"></i> Connecting...
            </div>
        </div>
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value" id="totalStudents">0</div><div class="stat-label">Total Students</div></div>
            <div class="stat-card"><div class="stat-icon">📚</div><div class="stat-value" id="totalGroups">0</div><div class="stat-label">Active Groups</div></div>
            <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-value" id="currentMonth"></div><div class="stat-label">Current Month</div></div>
            <div class="stat-card"><div class="stat-icon">⚡</div><div class="stat-value" id="syncTime">-</div><div class="stat-label">Last Sync</div></div>
        </div>
    </div>

    <div class="day-cards" id="dayCards">
        <div class="day-card" data-day-type="odd">
            <div class="day-icon">🔵</div>
            <h2>TOQ KUNLAR</h2>
            <p>Monday / Wednesday / Friday</p>
        </div>
        <div class="day-card even" data-day-type="even">
            <div class="day-icon">🟠</div>
            <h2>JUFT KUNLAR</h2>
            <p>Tuesday / Thursday / Saturday</p>
        </div>
    </div>

    <div id="groupsSection" style="display: none;">
        <div class="group-tabs" id="groupTabs"></div>
        <div class="action-bar">
            <div></div>
            <div>
                <button class="btn-outline" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button class="btn-primary" id="sendAllNotificationsBtn"><i class="fas fa-bell"></i> Send Notifications</button>
            </div>
        </div>
        <div class="table-container" id="tableContainer">
            <div class="loading"><div class="spinner"></div>Select a group to view attendance</div>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="studentModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Add Student</h3>
        <input type="text" id="studentName" placeholder="Full Name">
        <input type="tel" id="studentPhone" placeholder="Phone Number">
        <div class="modal-buttons">
            <button class="btn-outline" onclick="closeModal()">Cancel</button>
            <button class="btn-primary" id="modalSaveBtn">Save</button>
        </div>
    </div>
</div>

<!-- Floating Action Button -->
<button class="fab-add" id="fabAddBtn">
    <i class="fas fa-plus"></i> Add Student
</button>

<script>
    // ==================== YOUR WEB APP URL ====================
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzV4TgY5X7noGHkhoXuXgtnEzuDBNxSIpMsFkx9ZHyk1yse-8VlTwAXYlOX8yE_rsn9/exec';
    
    let allData = null;
    let currentDayType = null;
    let currentGroup = null;
    let currentGroupData = null;
    let selectedStudent = null;
    let modalAction = 'add';

    // ==================== API CALLS ====================
    async function fetchAPI(action, method = 'GET', body = null) {
        try {
            let url = `${WEBAPP_URL}?action=${encodeURIComponent(action)}`;
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            
            if (body && method === 'POST') {
                url = WEBAPP_URL;
                options.body = JSON.stringify(body);
            }
            
            console.log(`Fetching: ${action}`, method);
            const response = await fetch(url, options);
            const json = await response.json();
            
            if (json.success) {
                document.getElementById('connectionStatus').innerHTML = '<i class="fas fa-circle" style="font-size: 8px; color: #10b981;"></i> Connected to Sheet';
                document.getElementById('connectionStatus').style.background = 'rgba(16, 185, 129, 0.15)';
                return json.data;
            } else {
                throw new Error(json.error || 'Request failed');
            }
        } catch (err) {
            console.error('API Error:', err);
            document.getElementById('connectionStatus').innerHTML = '<i class="fas fa-circle" style="font-size: 8px; color: #f59e0b;"></i> Demo Mode';
            document.getElementById('connectionStatus').style.background = 'rgba(245, 158, 11, 0.15)';
            return null;
        }
    }

    async function loadAllData() {
        showToast('Loading data from Google Sheets...', 'info');
        const data = await fetchAPI('getAllData');
        
        if (data && data.groups && data.groups.length > 0) {
            allData = data;
            updateStats();
            showToast(`✅ Loaded ${data.groups.length} groups from your sheet`, 'success');
        } else {
            // Demo data fallback with your actual students
            allData = getDemoData();
            updateStats();
            showToast('⚠️ Using demo data - Check Web App deployment', 'warning');
        }
        
        document.getElementById('syncTime').innerText = new Date().toLocaleTimeString();
    }

    function getDemoData() {
        return {
            groups: [
                { name: "Group 1", days: "odd", tabColor: "#1A5276", students: [
                    { rowIndex: 4, name: "Saydullayev Sanjar", phone: "773961171" },
                    { rowIndex: 5, name: "Ravshanov Ruslan", phone: "335376070" },
                    { rowIndex: 6, name: "Kashtiboeva Odina", phone: "933700640" }
                ]},
                { name: "Group 2", days: "odd", tabColor: "#1F618D", students: [
                    { rowIndex: 7, name: "Abdishukurov Dilshod", phone: "998881447600" },
                    { rowIndex: 8, name: "Xalimova Sarpy", phone: "975768510" }
                ]},
                { name: "Group 3", days: "odd", tabColor: "#2471A3", students: [
                    { rowIndex: 9, name: "Zaynayeva Sabrina", phone: "915501284" },
                    { rowIndex: 10, name: "Tuychiyev Zohid", phone: "938603836" }
                ]},
                { name: "Group 4", days: "even", tabColor: "#784212", students: [
                    { rowIndex: 11, name: "Umid Eshboyev", phone: "899610821" },
                    { rowIndex: 12, name: "Abulqasimov Bekzod", phone: "989695439073" }
                ]},
                { name: "Group 5", days: "even", tabColor: "#A04000", students: [
                    { rowIndex: 13, name: "Xushboeva Dilsoz", phone: "909913102585" },
                    { rowIndex: 14, name: "Bakhytov Azizbek", phone: "945304326" }
                ]},
                { name: "Group 6", days: "even", tabColor: "#CA6F1E", students: [
                    { rowIndex: 15, name: "Xasanov Azizbek", phone: "772383638" },
                    { rowIndex: 16, name: "Raxmatova Sevinch", phone: "952324979" }
                ]}
            ],
            lastUpdate: new Date().toISOString()
        };
    }

    function updateStats() {
        if (!allData) return;
        const totalStudents = allData.groups.reduce((sum, g) => sum + (g.students?.length || 0), 0);
        document.getElementById('totalStudents').innerText = totalStudents;
        document.getElementById('totalGroups').innerText = allData.groups.length;
        document.getElementById('currentMonth').innerText = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });
    }

    // ==================== UI RENDERING ====================
    function selectDay(dayType) {
        currentDayType = dayType;
        const groups = allData.groups.filter(g => g.days === dayType);
        
        if (groups.length === 0) {
            document.getElementById('groupsSection').style.display = 'none';
            showToast('No groups for this day type', 'warning');
            return;
        }
        
        document.getElementById('groupsSection').style.display = 'block';
        renderGroupTabs(groups);
        
        if (groups.length > 0 && !currentGroup) {
            selectGroup(groups[0].name);
        }
    }

    function renderGroupTabs(groups) {
        const container = document.getElementById('groupTabs');
        container.innerHTML = groups.map(group => `
            <button class="group-tab ${currentGroup === group.name ? 'active' : ''}" data-group="${group.name}">
                <i class="fas fa-users"></i> ${group.name}
                <span class="group-count">${group.students?.length || 0}</span>
            </button>
        `).join('');
        
        document.querySelectorAll('.group-tab').forEach(btn => {
            btn.addEventListener('click', () => selectGroup(btn.dataset.group));
        });
    }

    function selectGroup(groupName) {
        currentGroup = groupName;
        currentGroupData = allData.groups.find(g => g.name === groupName);
        
        document.querySelectorAll('.group-tab').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.group === groupName);
        });
        
        renderAttendanceTable();
    }

    function renderAttendanceTable() {
        if (!currentGroupData) return;
        
        const students = currentGroupData.students || [];
        const lessonDates = generateLessonDates();
        
        if (students.length === 0) {
            document.getElementById('tableContainer').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-user-plus" style="font-size: 48px; margin-bottom: 16px; opacity: 0.5;"></i>
                    <p>No students in ${currentGroup} yet</p>
                    <button class="btn-primary" style="margin-top: 16px;" onclick="openAddModal()">+ Add First Student</button>
                </div>
            `;
            return;
        }
        
        let tableHtml = `
            <table class="attendance-table">
                <thead>
                    <tr>
                        <th style="min-width: 180px; position: sticky; left: 0;">Student</th>
                        <th style="min-width: 100px;">Phone</th>
                        ${lessonDates.map(ld => `<th>${ld.weekday}<br>${ld.day}</th>`).join('')}
                        <th style="min-width: 100px;">Actions</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        students.forEach((student, idx) => {
            tableHtml += `
                <tr>
                    <td class="student-name-cell" style="position: sticky; left: 0;">
                        <strong>${escapeHtml(student.name)}</strong>
                    </td>
                    <td>${escapeHtml(student.phone)}</td>
                    ${lessonDates.map(ld => `
                        <td>
                            <button class="attn-btn attn-green" onclick="markAttendance('${currentGroupData.name}', ${student.rowIndex}, 'Present + Full HW', ${ld.day})">✅ P</button>
                            <button class="attn-btn attn-yellow" onclick="markAttendance('${currentGroupData.name}', ${student.rowIndex}, 'Present + Not Full H/W', ${ld.day})">🟡 P-</button>
                            <button class="attn-btn attn-red" onclick="markAttendance('${currentGroupData.name}', ${student.rowIndex}, 'Absent / No Show', ${ld.day})">🔴 A</button>
                        </td>
                    `).join('')}
                    <td>
                        <button class="action-icon" onclick="openEditModal(${student.rowIndex}, '${escapeHtml(student.name)}', '${escapeHtml(student.phone)}')"><i class="fas fa-edit"></i></button>
                        <button class="action-icon delete" onclick="deleteStudent('${currentGroupData.name}', ${student.rowIndex}, '${escapeHtml(student.name)}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `;
        });
        
        tableHtml += `</tbody></table>`;
        document.getElementById('tableContainer').innerHTML = tableHtml;
    }

    function generateLessonDates() {
        const dates = [];
        const today = new Date();
        const year = today.getFullYear();
        const month = today.getMonth();
        const weekdays = currentDayType === 'odd' ? [1, 3, 5] : [2, 4, 6];
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        for (let d = 1; d <= daysInMonth; d++) {
            const date = new Date(year, month, d);
            if (weekdays.includes(date.getDay())) {
                dates.push({
                    day: d,
                    weekday: date.toLocaleDateString('en', { weekday: 'short' })
                });
            }
        }
        return dates;
    }

    // ==================== ATTENDANCE OPERATIONS ====================
    async function markAttendance(groupName, rowIndex, status, day) {
        const payload = {
            action: 'updateAttendance',
            groupName: groupName,
            day: day,
            attendance: [{ rowIndex: rowIndex, status: status }]
        };
        
        const result = await fetchAPI('updateAttendance', 'POST', payload);
        if (result) {
            showToast(`✅ Marked: ${status}`, 'success');
        } else {
            showToast(`⚠️ Demo: ${status} (not saved)`, 'warning');
        }
    }

    // ==================== STUDENT OPERATIONS ====================
    function openAddModal() {
        modalAction = 'add';
        document.getElementById('modalTitle').innerText = 'Add New Student';
        document.getElementById('studentName').value = '';
        document.getElementById('studentPhone').value = '';
        document.getElementById('studentModal').classList.add('active');
    }

    function openEditModal(rowIndex, name, phone) {
        modalAction = 'edit';
        selectedStudent = { rowIndex, name, phone };
        document.getElementById('modalTitle').innerText = 'Edit Student';
        document.getElementById('studentName').value = name;
        document.getElementById('studentPhone').value = phone;
        document.getElementById('studentModal').classList.add('active');
    }

    async function saveStudent() {
        const name = document.getElementById('studentName').value.trim();
        const phone = document.getElementById('studentPhone').value.trim();
        
        if (!name) {
            showToast('Please enter student name', 'error');
            return;
        }
        
        if (modalAction === 'add') {
            const payload = {
                action: 'addStudent',
                groupName: currentGroup,
                name: name,
                phone: phone,
                notes: ''
            };
            const result = await fetchAPI('addStudent', 'POST', payload);
            if (result) {
                showToast(`✅ Added ${name}`, 'success');
                loadAllData();
                setTimeout(() => selectGroup(currentGroup), 500);
            } else {
                const newRow = Math.max(...(currentGroupData.students.map(s => s.rowIndex) || [15])) + 1;
                currentGroupData.students.push({ rowIndex: newRow, name: name, phone: phone });
                renderAttendanceTable();
                showToast(`⚠️ Demo: ${name} added locally`, 'warning');
            }
        } else if (modalAction === 'edit' && selectedStudent) {
            const payload = {
                action: 'updateStudent',
                groupName: currentGroup,
                rowIndex: selectedStudent.rowIndex,
                name: name,
                phone: phone,
                notes: ''
            };
            const result = await fetchAPI('updateStudent', 'POST', payload);
            if (result) {
                showToast(`✅ Updated ${name}`, 'success');
                loadAllData();
                setTimeout(() => selectGroup(currentGroup), 500);
            } else {
                const student = currentGroupData.students.find(s => s.rowIndex === selectedStudent.rowIndex);
                if (student) {
                    student.name = name;
                    student.phone = phone;
                }
                renderAttendanceTable();
                showToast(`⚠️ Demo: ${name} updated locally`, 'warning');
            }
        }
        
        closeModal();
    }

    async function deleteStudent(groupName, rowIndex, studentName) {
        if (!confirm(`Delete ${studentName}? This cannot be undone.`)) return;
        
        const payload = {
            action: 'deleteStudent',
            groupName: groupName,
            rowIndex: rowIndex
        };
        
        const result = await fetchAPI('deleteStudent', 'POST', payload);
        if (result) {
            showToast(`🗑️ Deleted ${studentName}`, 'success');
            loadAllData();
            setTimeout(() => selectGroup(groupName), 500);
        } else {
            const index = currentGroupData.students.findIndex(s => s.rowIndex === rowIndex);
            if (index !== -1) currentGroupData.students.splice(index, 1);
            renderAttendanceTable();
            showToast(`⚠️ Demo: ${studentName} deleted locally`, 'warning');
        }
    }

    async function sendAllNotifications() {
        if (!currentGroupData) return;
        
        showToast(`📨 Sending notifications to ${currentGroup} parents...`, 'info');
        
        const payload = {
            action: 'sendNotifications',
            groupName: currentGroup,
            notifications: currentGroupData.students.map(s => ({ name: s.name, phone: s.phone }))
        };
        
        const result = await fetchAPI('sendNotifications', 'POST', payload);
        if (result) {
            showToast(`✅ Notifications sent to ${currentGroupData.students.length} students`, 'success');
        } else {
            showToast(`⚠️ Demo: Would send ${currentGroupData.students.length} notifications`, 'warning');
        }
    }

    // ==================== UI HELPERS ====================
    function showToast(message, type) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        const colors = { success: '#10b981', error: '#ef4444', warning: '#f59e0b', info: '#3b82f6' };
        toast.style.background = colors[type] || colors.info;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    function closeModal() {
        document.getElementById('studentModal').classList.remove('active');
    }

    // ==================== EVENT LISTENERS ====================
    document.querySelectorAll('.day-card').forEach(card => {
        card.addEventListener('click', () => selectDay(card.dataset.dayType));
    });

    document.getElementById('refreshBtn')?.addEventListener('click', () => {
        loadAllData();
        if (currentGroup) setTimeout(() => selectGroup(currentGroup), 500);
    });

    document.getElementById('sendAllNotificationsBtn')?.addEventListener('click', sendAllNotifications);
    document.getElementById('modalSaveBtn')?.addEventListener('click', saveStudent);
    document.getElementById('fabAddBtn')?.addEventListener('click', openAddModal);
    
    document.getElementById('studentModal')?.addEventListener('click', (e) => {
        if (e.target === document.getElementById('studentModal')) closeModal();
    });

    // Initialize
    loadAllData();
</script>
</body>
</html>
