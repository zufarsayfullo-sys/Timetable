<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dars Jadvali — Teacher Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d0f14;
    --surface:  #161922;
    --card:     #1e2330;
    --border:   #2a2f3d;
    --accent:   #4f9cf9;
    --accent2:  #a78bfa;
    --green:    #00b050;
    --yellow:   #ffc000;
    --red:      #ff3333;
    --text:     #e8eaf0;
    --muted:    #6b7280;
    --mono:     'JetBrains Mono', monospace;
    --display:  'Unbounded', sans-serif;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: var(–mono);
font-size: 13px;
min-height: 100vh;
}

/* ── TOPBAR ── */
.topbar {
display: flex;
align-items: center;
justify-content: space-between;
padding: 0 24px;
height: 56px;
background: var(–surface);
border-bottom: 1px solid var(–border);
position: sticky;
top: 0;
z-index: 100;
}
.topbar-brand {
font-family: var(–display);
font-size: 13px;
font-weight: 900;
letter-spacing: 0.05em;
color: var(–accent);
text-transform: uppercase;
}
.topbar-status {
display: flex;
align-items: center;
gap: 8px;
font-size: 11px;
color: var(–muted);
}
.dot {
width: 8px; height: 8px;
border-radius: 50%;
background: var(–muted);
}
.dot.live { background: var(–green); box-shadow: 0 0 8px var(–green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── SETUP SCREEN ── */
#setup-screen {
display: flex;
align-items: center;
justify-content: center;
min-height: calc(100vh - 56px);
padding: 24px;
}
.setup-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 12px;
padding: 40px;
max-width: 520px;
width: 100%;
}
.setup-card h2 {
font-family: var(–display);
font-size: 18px;
font-weight: 900;
margin-bottom: 8px;
color: var(–accent);
}
.setup-card p { color: var(–muted); margin-bottom: 24px; line-height: 1.6; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 11px; color: var(–muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
.field input {
width: 100%;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 6px;
padding: 10px 12px;
color: var(–text);
font-family: var(–mono);
font-size: 12px;
outline: none;
transition: border-color .2s;
}
.field input:focus { border-color: var(–accent); }

/* ── BUTTONS ── */
.btn {
display: inline-flex; align-items: center; gap: 6px;
padding: 9px 18px;
border: none; border-radius: 6px;
font-family: var(–mono); font-size: 12px; font-weight: 700;
cursor: pointer; transition: all .15s; text-transform: uppercase; letter-spacing: 0.05em;
}
.btn-primary { background: var(–accent); color: #fff; }
.btn-primary:hover { background: #6aabff; }
.btn-danger  { background: var(–red);    color: #fff; }
.btn-danger:hover { opacity: .85; }
.btn-success { background: var(–green);  color: #fff; }
.btn-success:hover { opacity: .85; }
.btn-ghost { background: transparent; color: var(–muted); border: 1px solid var(–border); }
.btn-ghost:hover { border-color: var(–accent); color: var(–accent); }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* ── MAIN LAYOUT ── */
#app { display: none; }
#app.visible { display: block; }

.layout { display: flex; height: calc(100vh - 56px); }

/* ── SIDEBAR ── */
.sidebar {
width: 200px;
background: var(–surface);
border-right: 1px solid var(–border);
flex-shrink: 0;
overflow-y: auto;
padding: 16px 0;
}
.sidebar-label {
font-size: 10px; color: var(–muted);
text-transform: uppercase; letter-spacing: 0.1em;
padding: 0 16px 8px;
}
.group-btn {
display: flex; align-items: center;
width: 100%; padding: 10px 16px;
background: none; border: none;
color: var(–muted); font-family: var(–mono); font-size: 12px;
cursor: pointer; text-align: left;
border-left: 3px solid transparent;
transition: all .15s;
}
.group-btn:hover { color: var(–text); background: var(–card); }
.group-btn.active { color: var(–accent); border-left-color: var(–accent); background: var(–card); }
.group-tag {
margin-left: auto; font-size: 10px;
background: var(–border); padding: 2px 6px; border-radius: 4px;
}
.sidebar-sep { height: 1px; background: var(–border); margin: 12px 16px; }
.sidebar-nav-btn {
display: flex; align-items: center; gap: 8px;
width: 100%; padding: 10px 16px;
background: none; border: none;
color: var(–muted); font-family: var(–mono); font-size: 12px;
cursor: pointer; text-align: left; transition: color .15s;
}
.sidebar-nav-btn:hover { color: var(–text); }
.sidebar-nav-btn.active { color: var(–accent2); }

/* ── MAIN CONTENT ── */
.main {
flex: 1; overflow-x: auto; overflow-y: auto;
padding: 24px;
background: var(–bg);
}

/* ── PAGE HEADER ── */
.page-header {
display: flex; align-items: center; gap: 16px;
margin-bottom: 20px; flex-wrap: wrap;
}
.page-title {
font-family: var(–display); font-size: 20px; font-weight: 900;
}
.page-subtitle { color: var(–muted); font-size: 11px; margin-top: 2px; }
.page-header-actions { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }

/* ── DATE SELECTOR ── */
.date-bar {
display: flex; gap: 6px; margin-bottom: 20px;
overflow-x: auto; padding-bottom: 4px;
}
.date-chip {
flex-shrink: 0;
padding: 6px 12px; border-radius: 6px;
background: var(–card); border: 1px solid var(–border);
color: var(–muted); font-family: var(–mono); font-size: 11px;
cursor: pointer; transition: all .15s; white-space: nowrap;
}
.date-chip:hover { border-color: var(–accent); color: var(–text); }
.date-chip.active { background: var(–accent); border-color: var(–accent); color: #fff; font-weight: 700; }
.date-chip.today { border-color: var(–accent2); }

/* ── STUDENT TABLE ── */
.table-wrap {
background: var(–card);
border: 1px solid var(–border);
border-radius: 10px;
overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead tr { background: var(–surface); }
th {
padding: 10px 14px; text-align: left;
font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
color: var(–muted); font-weight: 700; white-space: nowrap;
border-bottom: 1px solid var(–border);
}
tbody tr { border-bottom: 1px solid var(–border); transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(–surface); }
td { padding: 10px 14px; }

.student-name { font-weight: 700; color: var(–text); }
.student-phone { color: var(–muted); font-size: 12px; }
.student-notes { color: var(–muted); font-size: 11px; font-style: italic; }

/* ── ATTENDANCE BADGE ── */
.att-badge {
display: inline-flex; align-items: center;
padding: 4px 10px; border-radius: 4px;
font-size: 11px; font-weight: 700;
cursor: pointer; white-space: nowrap;
transition: opacity .15s;
border: none; font-family: var(–mono);
}
.att-badge:hover { opacity: .8; }
.att-present  { background: var(–green); color: #fff; }
.att-partial  { background: var(–yellow); color: #fff; }
.att-absent   { background: var(–red);   color: #fff; }
.att-empty    { background: var(–border); color: var(–muted); }

/* ── ATTENDANCE POPUP ── */
.att-popup {
position: fixed; z-index: 500;
background: var(–card); border: 1px solid var(–border);
border-radius: 8px; padding: 8px;
box-shadow: 0 8px 32px rgba(0,0,0,.5);
display: none;
min-width: 220px;
}
.att-popup.show { display: block; }
.att-option {
display: block; width: 100%;
padding: 8px 12px; border: none; border-radius: 4px;
background: none; color: var(–text);
font-family: var(–mono); font-size: 11px; font-weight: 700;
cursor: pointer; text-align: left; margin-bottom: 4px;
transition: all .1s;
}
.att-option:last-child { margin-bottom: 0; }
.att-option:hover { opacity: .85; color: #fff; }
.att-option.opt-clear { background: var(–border); color: var(–muted); }

/* ── SEND PANEL ── */
.send-panel {
background: var(–card);
border: 1px solid var(–border);
border-radius: 10px;
padding: 20px;
margin-bottom: 20px;
}
.send-panel h3 {
font-family: var(–display); font-size: 13px; font-weight: 700;
margin-bottom: 16px; color: var(–text);
}
.send-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.send-info { flex: 1; color: var(–muted); font-size: 12px; }
.send-stat { color: var(–text); font-weight: 700; }

/* ── LOG VIEW ── */
.log-entry {
background: var(–card); border: 1px solid var(–border);
border-radius: 8px; margin-bottom: 12px; overflow: hidden;
}
.log-header {
padding: 12px 16px; background: var(–surface);
border-bottom: 1px solid var(–border);
display: flex; align-items: center; gap: 12px;
}
.log-group { font-weight: 700; color: var(–accent); }
.log-date  { color: var(–muted); font-size: 11px; }
.log-time  { color: var(–muted); font-size: 11px; margin-left: auto; }
.log-rows  { padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 6px; }
.log-item  { font-size: 11px; padding: 3px 8px; border-radius: 4px; }

/* ── SPINNER ── */
.spinner {
display: inline-block; width: 14px; height: 14px;
border: 2px solid rgba(255,255,255,.3);
border-top-color: #fff; border-radius: 50%;
animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TOAST ── */
#toast-container {
position: fixed; bottom: 24px; right: 24px; z-index: 9999;
display: flex; flex-direction: column; gap: 8px;
}
.toast {
padding: 12px 18px; border-radius: 8px;
font-size: 12px; font-family: var(–mono);
box-shadow: 0 4px 20px rgba(0,0,0,.4);
animation: slideIn .2s ease;
max-width: 320px;
}
.toast.success { background: #1a3d2b; border: 1px solid var(–green); color: #4ade80; }
.toast.error   { background: #3d1a1a; border: 1px solid var(–red);   color: #f87171; }
.toast.info    { background: #1a2a3d; border: 1px solid var(–accent); color: #93c5fd; }
@keyframes slideIn { from { transform: translateX(40px); opacity:0; } to { transform: none; opacity:1; } }

/* ── LOADING OVERLAY ── */
#loading {
position: fixed; inset: 0; background: rgba(13,15,20,.85);
display: flex; flex-direction: column; align-items: center; justify-content: center;
z-index: 9000; gap: 16px;
}
#loading .big-spinner {
width: 40px; height: 40px;
border: 3px solid rgba(79,156,249,.2);
border-top-color: var(–accent); border-radius: 50%;
animation: spin .8s linear infinite;
}
#loading p { color: var(–muted); font-size: 12px; }

/* ── SETTINGS VIEW ── */
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 700px) { .settings-grid { grid-template-columns: 1fr; } }
.settings-section {
background: var(–card); border: 1px solid var(–border);
border-radius: 10px; padding: 20px;
}
.settings-section h3 {
font-family: var(–display); font-size: 12px; font-weight: 700;
color: var(–accent); margin-bottom: 16px; text-transform: uppercase;
}
.setting-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.setting-row label { width: 130px; flex-shrink: 0; color: var(–muted); font-size: 11px; }
.setting-row input {
flex: 1; background: var(–bg); border: 1px solid var(–border);
border-radius: 4px; padding: 7px 10px;
color: var(–text); font-family: var(–mono); font-size: 12px; outline: none;
}
.setting-row input:focus { border-color: var(–accent); }

/* ── INLINE EDIT ── */
.editable { cursor: pointer; }
.editable:hover { text-decoration: underline; text-decoration-style: dotted; }
.inline-input {
background: var(–bg); border: 1px solid var(–accent);
border-radius: 4px; padding: 3px 8px;
color: var(–text); font-family: var(–mono); font-size: 12px; outline: none;
width: 160px;
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
.sidebar { width: 56px; }
.group-btn span { display: none; }
.group-tag { display: none; }
.sidebar-label { display: none; }
.sidebar-nav-btn span { display: none; }
}
</style>

</head>

<script>
// ── CONFIG ────────────────────────────────────────────────────
let API_URL    = localStorage.getItem('api_url')    || '';
let API_SECRET = localStorage.getItem('api_secret') || '';

const ATTENDANCE_OPTIONS = [
  { label: "Present + Full HW",      color: "#00b050", cls: "att-present" },
  { label: "Present + Not Full H/W", color: "#ffc000", cls: "att-partial" },
  { label: "Absent / No Show",       color: "#ff3333", cls: "att-absent"  },
];

// ── STATE ────────────────────────────────────────────────────
let state = {
  groups:        {},
  settings:      {},
  currentGroup:  null,
  currentDateCol: null,
  currentView:   'group',
};

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (!API_URL || !API_SECRET) {
    showSetup();
  } else {
    loadData();
  }
});

function showSetup() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  document.getElementById('app').classList.remove('visible');
}

function saveConfig() {
  const url    = document.getElementById('setup-url').value.trim();
  const secret = document.getElementById('setup-secret').value.trim();
  if (!url || !secret) { toast('Enter URL and secret key', 'error'); return; }
  API_URL    = url;
  API_SECRET = secret;
  localStorage.setItem('api_url',    url);
  localStorage.setItem('api_secret', secret);
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  loadData();
}

function clearConfig() {
  if (!confirm('Disconnect from Google Sheet?')) return;
  localStorage.removeItem('api_url');
  localStorage.removeItem('api_secret');
  location.reload();
}

// ── API ──────────────────────────────────────────────────────
async function apiGet(action) {
  const url = `${API_URL}?secret=${encodeURIComponent(API_SECRET)}&action=${action}`;
  const res = await fetch(url);
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ...body, secret: API_SECRET })
  });
  return res.json();
}

// ── LOAD DATA ────────────────────────────────────────────────
async function loadData() {
  setStatus('loading');
  setLoading('Loading sheet data…');
  try {
    const [dataRes, settingsRes] = await Promise.all([
      apiGet('getAll'),
      apiGet('getSettings')
    ]);

    if (dataRes.error || settingsRes.error) {
      setStatus('error');
      hideLoading();
      toast(dataRes.error || settingsRes.error, 'error');
      showSetup();
      return;
    }

    state.groups   = dataRes.groups;
    state.settings = settingsRes.settings;

    buildSidebar();

    // Auto-select first group
    const firstGroup = Object.keys(state.groups)[0];
    if (firstGroup) selectGroup(firstGroup);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    setStatus('live');
    toast('Connected to Google Sheet ✓', 'success');
  } catch(e) {
    setStatus('error');
    hideLoading();
    toast('Connection failed: ' + e.message, 'error');
    showSetup();
  }
}

// ── SIDEBAR ──────────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('group-list');
  list.innerHTML = '';
  Object.keys(state.groups).forEach(groupName => {
    const g = state.groups[groupName];
    const tag = g.type === 'odd' ? 'M/W/F' : 'T/Th/S';
    const btn = document.createElement('button');
    btn.className = 'group-btn';
    btn.id = 'nav-' + groupName.replace(' ','');
    btn.onclick = () => selectGroup(groupName);
    btn.innerHTML = `<span>${groupName}</span><span class="group-tag">${tag}</span>`;
    list.appendChild(btn);
  });
}

// ── SELECT GROUP ─────────────────────────────────────────────
function selectGroup(groupName) {
  state.currentGroup = groupName;
  state.currentView  = 'group';

  // Update sidebar active state
  document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + groupName.replace(' ',''));
  if (btn) btn.classList.add('active');
  document.querySelectorAll('.sidebar-nav-btn').forEach(b => b.classList.remove('active'));

  showView('group');
  renderGroupView(groupName);
}

// ── GROUP VIEW ───────────────────────────────────────────────
function renderGroupView(groupName) {
  const g   = state.groups[groupName];
  const view = document.getElementById('view-group');

  // Find today's column
  const today = new Date();
  const todayLabel = String(today.getDate());

  // Auto-select most recent or today's date
  if (!state.currentDateCol && g.dates.length > 0) {
    // Try to find today
    let found = g.dates.find(d => {
      const parts = d.label.split('\n');
      return parts.length >= 2 && parts[1].trim() === todayLabel;
    });
    state.currentDateCol = found ? found.col : g.dates[g.dates.length - 1].col;
  }
  if (!state.currentDateCol) state.currentDateCol = g.dates[0]?.col;

  const selCol = state.currentDateCol;
  const selDate = g.dates.find(d => d.col === selCol);
  const dateLabel = selDate ? selDate.label.replace('\n', ' ') : '—';

  // Count stats for selected date
  const students = g.students;
  const present = students.filter(s => s.attendance[selCol] === "Present + Full HW").length;
  const partial = students.filter(s => s.attendance[selCol] === "Present + Not Full H/W").length;
  const absent  = students.filter(s => s.attendance[selCol] === "Absent / No Show").length;
  const empty   = students.filter(s => !s.attendance[selCol]).length;
  const total   = students.length;

  view.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">${groupName}</div>
        <div class="page-subtitle">${g.header || ''}</div>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-success" onclick="openSendPanel('${groupName}')">
          ▶ Send Notifications
        </button>
      </div>
    </div>

    <!-- SEND PANEL (hidden by default) -->
    <div class="send-panel" id="send-panel" style="display:none;">
      <h3>📨 Send Notifications — ${groupName}</h3>
      <div class="send-row">
        <div class="send-info">
          Date: <span class="send-stat">${dateLabel}</span> &nbsp;|&nbsp;
          <span class="att-badge att-present" style="cursor:default">✓ ${present}</span> &nbsp;
          <span class="att-badge att-partial" style="cursor:default">~ ${partial}</span> &nbsp;
          <span class="att-badge att-absent"  style="cursor:default">✗ ${absent}</span> &nbsp;
          <span style="color:var(--muted)">empty: ${empty}</span>
        </div>
        <button class="btn btn-success" id="send-btn" onclick="sendGroup('${groupName}', ${selCol}, '${dateLabel}')">
          ▶ Send ${total - empty} Messages
        </button>
        <button class="btn btn-ghost" onclick="closeSendPanel()">✕</button>
      </div>
      <div id="send-result" style="margin-top:12px;font-size:12px;color:var(--muted);"></div>
    </div>

    <!-- DATE CHIPS -->
    <div class="date-bar">
      ${g.dates.map(d => {
        const parts = d.label.split('\n');
        const dayName = parts[0] || '';
        const dayNum  = parts[1] || '';
        const isToday = dayNum.trim() === todayLabel;
        const isActive = d.col === selCol;
        return `<button class="date-chip${isActive?' active':''}${isToday&&!isActive?' today':''}"
          onclick="selectDate('${groupName}', ${d.col})">
          ${dayName}<br><strong>${dayNum}</strong>
        </button>`;
      }).join('')}
    </div>

    <!-- STUDENT TABLE -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Full Name</th>
            <th>Phone</th>
            <th>Notes</th>
            <th>${dateLabel}</th>
          </tr>
        </thead>
        <tbody>
          ${students.map((s, i) => {
            const att = s.attendance[selCol] || '';
            const badgeCls = att === "Present + Full HW" ? 'att-present'
              : att === "Present + Not Full H/W" ? 'att-partial'
              : att === "Absent / No Show" ? 'att-absent' : 'att-empty';
            const badgeText = att === "Present + Full HW" ? '✓ Full HW'
              : att === "Present + Not Full H/W" ? '~ Partial'
              : att === "Absent / No Show" ? '✗ Absent' : '— empty';
            return `<tr>
              <td style="color:var(--muted)">${i+1}</td>
              <td>
                <div class="student-name editable" onclick="editName('${groupName}', ${s.row}, this)">${s.name}</div>
              </td>
              <td>
                <div class="student-phone editable" onclick="editPhone('${groupName}', ${s.row}, this)">${s.phone || '—'}</div>
              </td>
              <td><div class="student-notes">${s.notes || ''}</div></td>
              <td>
                <button class="att-badge ${badgeCls}"
                  onclick="openAttPopup(event, '${groupName}', ${s.row}, ${selCol}, this)">
                  ${badgeText}
                </button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

// ── DATE SELECT ──────────────────────────────────────────────
function selectDate(groupName, col) {
  state.currentDateCol = col;
  renderGroupView(groupName);
}

// ── SEND PANEL ───────────────────────────────────────────────
function openSendPanel(groupName) {
  const panel = document.getElementById('send-panel');
  if (panel) panel.style.display = 'block';
}
function closeSendPanel() {
  const panel = document.getElementById('send-panel');
  if (panel) panel.style.display = 'none';
}

async function sendGroup(groupName, col, dateLabel) {
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Sending…';

  const resultDiv = document.getElementById('send-result');
  resultDiv.innerHTML = 'Sending messages…';

  try {
    const res = await apiPost({
      action: 'sendGroup',
      group:  groupName,
      col:    col,
      dateLabel: dateLabel
    });

    if (res.error) {
      resultDiv.innerHTML = `<span style="color:var(--red)">❌ ${res.error}</span>`;
      toast(res.error, 'error');
    } else {
      resultDiv.innerHTML = `<span style="color:var(--green)">✅ Sent: ${res.sent} messages | Skipped: ${res.skipped}</span>`;
      toast(`✅ ${res.sent} messages sent!`, 'success');
    }
  } catch(e) {
    resultDiv.innerHTML = `<span style="color:var(--red)">❌ ${e.message}</span>`;
    toast('Send failed: ' + e.message, 'error');
  }

  btn.disabled = false;
  btn.innerHTML = '▶ Send Messages';
}

// ── ATTENDANCE POPUP ─────────────────────────────────────────
let popupState = {};

function openAttPopup(event, groupName, row, col, triggerEl) {
  event.stopPropagation();
  popupState = { groupName, row, col, triggerEl };

  const popup = document.getElementById('att-popup');
  popup.innerHTML = ATTENDANCE_OPTIONS.map(opt =>
    `<button class="att-option" style="background:${opt.color}"
      onclick="setAttendance('${opt.label.replace(/'/g,"\\'")}')">
      ${opt.label}
    </button>`
  ).join('') +
  `<button class="att-option opt-clear" onclick="setAttendance('')">✕ Clear</button>`;

  // Position popup near click
  const rect = triggerEl.getBoundingClientRect();
  popup.style.left = Math.min(rect.left, window.innerWidth - 240) + 'px';
  popup.style.top  = (rect.bottom + 6) + 'px';
  popup.classList.add('show');
}

document.addEventListener('click', () => {
  document.getElementById('att-popup').classList.remove('show');
});

async function setAttendance(value) {
  const { groupName, row, col, triggerEl } = popupState;
  document.getElementById('att-popup').classList.remove('show');

  // Optimistic UI update
  const badgeCls = value === "Present + Full HW" ? 'att-present'
    : value === "Present + Not Full H/W" ? 'att-partial'
    : value === "Absent / No Show" ? 'att-absent' : 'att-empty';
  const badgeText = value === "Present + Full HW" ? '✓ Full HW'
    : value === "Present + Not Full H/W" ? '~ Partial'
    : value === "Absent / No Show" ? '✗ Absent' : '— empty';

  triggerEl.className = `att-badge ${badgeCls}`;
  triggerEl.textContent = badgeText;
  triggerEl.onclick = (e) => openAttPopup(e, groupName, row, col, triggerEl);

  // Update state
  if (!state.groups[groupName]) return;
  const student = state.groups[groupName].students.find(s => s.row === row);
  if (student) student.attendance[col] = value;

  // Send to sheet
  try {
    await apiPost({ action: 'updateAttendance', group: groupName, row, col, value });
  } catch(e) {
    toast('Save failed: ' + e.message, 'error');
  }
}

// ── INLINE EDIT ──────────────────────────────────────────────
function editField(groupName, row, el, field) {
  const current = el.textContent === '—' ? '' : el.textContent;
  const input = document.createElement('input');
  input.className = 'inline-input';
  input.value = current;
  el.replaceWith(input);
  input.focus();

  const save = async () => {
    const val = input.value.trim();
    const newEl = document.createElement('div');
    newEl.className = el.className;
    newEl.textContent = val || '—';
    newEl.onclick = () => editField(groupName, row, newEl, field);
    input.replaceWith(newEl);

    // Update state
    const student = state.groups[groupName]?.students.find(s => s.row === row);
    if (student) student[field] = val;

    try {
      await apiPost({ action: 'updateStudent', group: groupName, row, [field]: val });
    } catch(e) {
      toast('Save failed', 'error');
    }
  };

  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { input.value = current; input.blur(); } });
}

function editName(groupName, row, el)  { editField(groupName, row, el, 'name'); }
function editPhone(groupName, row, el) { editField(groupName, row, el, 'phone'); }

// ── LOGS VIEW ────────────────────────────────────────────────
async function renderLogsView() {
  const view = document.getElementById('view-logs');
  view.innerHTML = `<div class="page-header"><div><div class="page-title">Send Logs</div><div class="page-subtitle">Last 20 notification batches</div></div></div><p style="color:var(--muted)">Loading…</p>`;

  try {
    const res = await apiGet('getLogs');
    if (!res.logs || res.logs.length === 0) {
      view.innerHTML += '<p style="color:var(--muted);margin-top:20px;">No logs yet. Send some notifications first.</p>';
      return;
    }
    const logsHtml = res.logs.map(log => {
      const items = (log.log || []).map(l => {
        const cls = l.attendance === "Present + Full HW" ? 'att-present'
          : l.attendance === "Present + Not Full H/W" ? 'att-partial'
          : l.attendance === "Absent / No Show" ? 'att-absent' : '';
        return `<span class="log-item att-badge ${cls}" style="cursor:default">${l.name}</span>`;
      }).join('');
      const time = log.time ? new Date(log.time).toLocaleString() : '';
      return `<div class="log-entry">
        <div class="log-header">
          <span class="log-group">${log.group}</span>
          <span class="log-date">${log.date}</span>
          <span class="log-time">${time}</span>
        </div>
        <div class="log-rows">${items || '<span style="color:var(--muted);font-size:12px">No entries</span>'}</div>
      </div>`;
    }).join('');
    view.innerHTML = `<div class="page-header"><div><div class="page-title">Send Logs</div><div class="page-subtitle">Last 20 notification batches</div></div></div>${logsHtml}`;
  } catch(e) {
    view.innerHTML += `<p style="color:var(--red)">Error: ${e.message}</p>`;
  }
}

// ── SETTINGS VIEW ────────────────────────────────────────────
function renderSettingsView() {
  const s = state.settings;
  const view = document.getElementById('view-settings');
  view.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Settings</div><div class="page-subtitle">Changes sync to Google Sheet</div></div>
    </div>
    <div class="settings-grid">
      <div class="settings-section">
        <h3>📱 SMS Gate</h3>
        <div class="setting-row"><label>URL</label><input id="s-smsUrl" value="${s.smsGateUrl||''}"></div>
        <div class="setting-row"><label>Login</label><input id="s-smsLogin" value="${s.smsGateLogin||''}"></div>
        <div class="setting-row"><label>Password</label><input id="s-smsPwd" type="password" value="${s.smsGatePassword||''}"></div>
        <div class="setting-row"><label>SIM Slot</label><input id="s-simSlot" value="${s.smsSimSlot||'1'}" style="width:60px"></div>
        <button class="btn btn-primary" onclick="saveSMSSettings()">Save SMS Settings</button>
      </div>
      <div class="settings-section">
        <h3>✈️ Telegram</h3>
        <div class="setting-row"><label>Bot Token</label><input id="s-token" value="${s.botToken||''}"></div>
        ${(s.chatIds||[]).map((c,i) =>
          `<div class="setting-row"><label>${c.group}</label><input id="s-chat-${i}" value="${c.chatId||''}"></div>`
        ).join('')}
        <button class="btn btn-primary" onclick="saveTelegramSettings()">Save Telegram Settings</button>
      </div>
      <div class="settings-section" style="grid-column:1/-1">
        <h3>💬 Message Templates</h3>
        <p style="color:var(--muted);font-size:11px;margin-bottom:16px;">Use <code style="color:var(--accent)">{name}</code> and <code style="color:var(--accent)">{date}</code> as placeholders.</p>
        ${Object.entries(s.messages||{}).map(([key, val]) => {
          const id = 'msg-' + key.replace(/[^a-z]/gi,'');
          return `<div class="field" style="margin-bottom:12px">
            <label style="display:block;font-size:11px;color:var(--muted);margin-bottom:6px">${key}</label>
            <input id="${id}" value="${val}" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:8px 10px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none">
          </div>`;
        }).join('')}
        <button class="btn btn-primary" onclick="saveMessageTemplates()">Save Messages</button>
      </div>
    </div>
  `;
}

async function saveSMSSettings() {
  await Promise.all([
    apiPost({ action:'updateSetting', key:'SMS Gate URL',      value: document.getElementById('s-smsUrl').value }),
    apiPost({ action:'updateSetting', key:'SMS Gate Login',    value: document.getElementById('s-smsLogin').value }),
    apiPost({ action:'updateSetting', key:'SMS Gate Password', value: document.getElementById('s-smsPwd').value }),
    apiPost({ action:'updateSetting', key:'SMS SIM Slot',      value: document.getElementById('s-simSlot').value }),
  ]);
  toast('SMS settings saved ✓', 'success');
}

async function saveTelegramSettings() {
  const chatIds = state.settings.chatIds || [];
  await apiPost({ action:'updateSetting', key:'Bot Token', value: document.getElementById('s-token').value });
  await Promise.all(chatIds.map((c, i) =>
    apiPost({ action:'updateSetting', key: c.group + ' Chat ID', value: document.getElementById('s-chat-'+i).value })
  ));
  toast('Telegram settings saved ✓', 'success');
}

async function saveMessageTemplates() {
  const msgs = state.settings.messages || {};
  await Promise.all(Object.keys(msgs).map(key => {
    const id  = 'msg-' + key.replace(/[^a-z]/gi,'');
    const val = document.getElementById(id)?.value || msgs[key];
    return apiPost({ action:'updateSetting', key:'Msg: '+key, value: val });
  }));
  toast('Message templates saved ✓', 'success');
}

// ── SHOW VIEW ────────────────────────────────────────────────
function showView(view) {
  document.getElementById('view-group').style.display    = view === 'group'    ? 'block' : 'none';
  document.getElementById('view-logs').style.display     = view === 'logs'     ? 'block' : 'none';
  document.getElementById('view-settings').style.display = view === 'settings' ? 'block' : 'none';

  document.querySelectorAll('.sidebar-nav-btn').forEach(b => b.classList.remove('active'));

  if (view === 'logs')     { document.getElementById('nav-logs').classList.add('active');     renderLogsView(); }
  if (view === 'settings') { document.getElementById('nav-settings').classList.add('active'); renderSettingsView(); }
  if (view === 'group')    { document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active')); }
}

// ── STATUS ───────────────────────────────────────────────────
function setStatus(s) {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  if (s === 'live')    { dot.className='dot live'; text.textContent='Live'; }
  if (s === 'loading') { dot.className='dot'; text.textContent='Syncing…'; }
  if (s === 'error')   { dot.className='dot'; dot.style.background='var(--red)'; text.textContent='Disconnected'; }
}

function setLoading(msg) {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loading-text').textContent = msg;
}
function hideLoading() {
  document.getElementById('loading').style.display = 'none';
}

// ── TOAST ────────────────────────────────────────────────────
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
</script>
