<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dars Jadvali</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0d0f14;
  --surf:    #161922;
  --card:    #1e2330;
  --border:  #2a2f3d;
  --accent:  #4f9cf9;
  --green:   #00b050;
  --yellow:  #e6ac00;
  --red:     #e03333;
  --text:    #e8eaf0;
  --muted:   #6b7280;
  --mono:    'JetBrains Mono', monospace;
  --head:    'Unbounded', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; min-height: 100vh; }

.topbar {
display: flex; align-items: center; justify-content: space-between;
padding: 0 20px; height: 52px;
background: var(–surf); border-bottom: 1px solid var(–border);
position: sticky; top: 0; z-index: 200;
}
.brand { font-family: var(–head); font-size: 12px; font-weight: 900; color: var(–accent); letter-spacing: .06em; }
.top-right { display: flex; align-items: center; gap: 10px; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(–muted); transition: background .3s; }
.live-dot.on { background: var(–green); box-shadow: 0 0 6px var(–green); animation: blink 2s infinite; }
.live-dot.err { background: var(–red); }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
#status-txt { font-size: 11px; color: var(–muted); }

.layout { display: flex; height: calc(100vh - 52px); }

.sidebar {
width: 185px; flex-shrink: 0;
background: var(–surf); border-right: 1px solid var(–border);
overflow-y: auto; padding: 12px 0;
}
.sb-label { font-size: 10px; color: var(–muted); text-transform: uppercase; letter-spacing: .1em; padding: 0 14px 8px; }
.sb-btn {
display: flex; align-items: center; justify-content: space-between;
width: 100%; padding: 9px 14px;
background: none; border: none; border-left: 3px solid transparent;
color: var(–muted); font-family: var(–mono); font-size: 12px;
cursor: pointer; text-align: left; transition: all .12s;
}
.sb-btn:hover { color: var(–text); background: var(–card); }
.sb-btn.active { color: var(–accent); border-left-color: var(–accent); background: var(–card); }
.sb-tag { font-size: 10px; background: var(–border); padding: 2px 5px; border-radius: 3px; }
.sb-sep { height: 1px; background: var(–border); margin: 10px 14px; }
.sb-nav {
display: flex; align-items: center; gap: 8px;
width: 100%; padding: 9px 14px;
background: none; border: none;
color: var(–muted); font-family: var(–mono); font-size: 12px;
cursor: pointer; transition: color .12s; text-align: left;
}
.sb-nav:hover { color: var(–text); }
.sb-nav.active { color: #a78bfa; }

.main { flex: 1; overflow: auto; padding: 22px; }

.btn {
display: inline-flex; align-items: center; gap: 6px;
padding: 8px 16px; border: none; border-radius: 6px;
font-family: var(–mono); font-size: 11px; font-weight: 700;
cursor: pointer; transition: opacity .15s; text-transform: uppercase; letter-spacing: .04em;
}
.btn:disabled { opacity: .35; cursor: not-allowed; }
.btn-blue  { background: var(–accent); color: #fff; }
.btn-green { background: var(–green);  color: #fff; }
.btn-ghost { background: transparent; color: var(–muted); border: 1px solid var(–border); }
.btn-ghost:hover { border-color: var(–accent); color: var(–accent); }

.ph { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
.ph-title { font-family: var(–head); font-size: 18px; font-weight: 900; }
.ph-sub { color: var(–muted); font-size: 11px; margin-top: 3px; }

.send-panel { background: var(–card); border: 1px solid var(–border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.send-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.send-stats { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; flex: 1; }
.sc { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; color: #fff; }
.sc-g { background: var(–green); }
.sc-y { background: var(–yellow); }
.sc-r { background: var(–red); }
.sc-e { background: var(–border); color: var(–muted); }
#send-result { margin-top: 10px; font-size: 12px; }

.date-bar { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
.dc {
flex-shrink: 0; padding: 5px 11px; border-radius: 6px;
background: var(–card); border: 1px solid var(–border);
color: var(–muted); font-family: var(–mono); font-size: 11px;
cursor: pointer; transition: all .12s; text-align: center; line-height: 1.4;
}
.dc:hover { border-color: var(–accent); color: var(–text); }
.dc.active { background: var(–accent); border-color: var(–accent); color: #fff; font-weight: 700; }
.dc.today  { border-color: #a78bfa; }

.tbl-wrap { background: var(–card); border: 1px solid var(–border); border-radius: 8px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead tr { background: var(–surf); }
th { padding: 9px 13px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(–muted); font-weight: 700; border-bottom: 1px solid var(–border); white-space: nowrap; }
tbody tr { border-bottom: 1px solid var(–border); transition: background .08s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(–surf); }
td { padding: 9px 13px; }
.sname  { font-weight: 700; }
.sphone { color: var(–muted); }
.editable { cursor: pointer; }
.editable:hover { text-decoration: underline dotted; }
.inline-inp {
background: var(–bg); border: 1px solid var(–accent);
border-radius: 4px; padding: 3px 7px;
color: var(–text); font-family: var(–mono); font-size: 12px;
outline: none; width: 160px;
}

.att {
display: inline-flex; align-items: center;
padding: 4px 9px; border-radius: 4px;
font-size: 11px; font-weight: 700;
cursor: pointer; border: none; font-family: var(–mono);
transition: opacity .12s; white-space: nowrap;
}
.att:hover { opacity: .8; }
.att-g { background: var(–green);  color: #fff; }
.att-y { background: var(–yellow); color: #fff; }
.att-r { background: var(–red);    color: #fff; }
.att-e { background: var(–border); color: var(–muted); }

.popup {
position: fixed; z-index: 600;
background: var(–card); border: 1px solid var(–border);
border-radius: 8px; padding: 6px; min-width: 230px;
box-shadow: 0 8px 32px rgba(0,0,0,.6);
display: none;
}
.popup.show { display: block; }
.pop-opt {
display: block; width: 100%; padding: 8px 11px; border: none; border-radius: 4px;
background: none; color: var(–text); font-family: var(–mono); font-size: 11px; font-weight: 700;
cursor: pointer; text-align: left; margin-bottom: 3px; transition: opacity .1s;
}
.pop-opt:last-child { margin-bottom: 0; }
.pop-opt:hover { opacity: .8; color: #fff; }
.pop-clear { background: var(–border) !important; color: var(–muted) !important; }

.log-card { background: var(–card); border: 1px solid var(–border); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
.log-head { padding: 11px 15px; background: var(–surf); border-bottom: 1px solid var(–border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.log-grp  { font-weight: 700; color: var(–accent); }
.log-date { color: var(–muted); font-size: 11px; }
.log-time { color: var(–muted); font-size: 11px; margin-left: auto; }
.log-body { padding: 11px 15px; display: flex; flex-wrap: wrap; gap: 5px; }

.set-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
@media(max-width:650px){ .set-grid { grid-template-columns: 1fr; } }
.set-sec { background: var(–card); border: 1px solid var(–border); border-radius: 8px; padding: 18px; }
.set-sec h3 { font-family: var(–head); font-size: 11px; font-weight: 700; color: var(–accent); margin-bottom: 14px; text-transform: uppercase; }
.set-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.set-row label { width: 110px; flex-shrink: 0; color: var(–muted); font-size: 11px; }
.set-row input {
flex: 1; background: var(–bg); border: 1px solid var(–border);
border-radius: 4px; padding: 7px 9px;
color: var(–text); font-family: var(–mono); font-size: 12px; outline: none;
}
.set-row input:focus { border-color: var(–accent); }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; color: var(–muted); margin-bottom: 5px; }
.field input {
width: 100%; background: var(–bg); border: 1px solid var(–border);
border-radius: 4px; padding: 7px 9px;
color: var(–text); font-family: var(–mono); font-size: 12px; outline: none;
}
.field input:focus { border-color: var(–accent); }

#overlay {
position: fixed; inset: 0; background: rgba(13,15,20,.92);
display: flex; flex-direction: column; align-items: center; justify-content: center;
z-index: 9999; gap: 14px;
}
.spin { width: 36px; height: 36px; border: 3px solid rgba(79,156,249,.2); border-top-color: var(–accent); border-radius: 50%; animation: sp .7s linear infinite; }
@keyframes sp { to{transform:rotate(360deg)} }
#overlay p { color: var(–muted); font-size: 12px; }

#toasts { position: fixed; bottom: 20px; right: 20px; z-index: 9998; display: flex; flex-direction: column; gap: 7px; }
.toast { padding: 11px 16px; border-radius: 7px; font-size: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.4); animation: tin .2s ease; max-width: 300px; }
.toast.ok  { background: #1a3d2b; border: 1px solid var(–green);  color: #4ade80; }
.toast.err { background: #3d1a1a; border: 1px solid var(–red);    color: #f87171; }
.toast.inf { background: #1a2a3d; border: 1px solid var(–accent); color: #93c5fd; }
@keyframes tin { from{transform:translateX(30px);opacity:0} to{transform:none;opacity:1} }

.sp-sm { display:inline-block; width:12px; height:12px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:sp .6s linear infinite; vertical-align:middle; }
</style>

</head>
<body>

<div class="topbar">
  <div class="brand">📚 DARS JADVALI</div>
  <div class="top-right">
    <div class="live-dot" id="dot"></div>
    <span id="status-txt">Connecting…</span>
    <button class="btn btn-ghost" style="padding:4px 10px" onclick="reload()">↻ Refresh</button>
  </div>
</div>

<div id="overlay">
  <div class="spin"></div>
  <p id="overlay-txt">Connecting to Google Sheet…</p>
</div>

<div id="app" style="display:none">
  <div class="layout">
    <div class="sidebar">
      <div class="sb-label">Groups</div>
      <div id="grp-list"></div>
      <div class="sb-sep"></div>
      <button class="sb-nav" id="nav-logs"     onclick="showView('logs')">📋 Send Logs</button>
      <button class="sb-nav" id="nav-settings" onclick="showView('settings')">⚙️ Settings</button>
    </div>
    <div class="main">
      <div id="view-group"></div>
      <div id="view-logs"     style="display:none"></div>
      <div id="view-settings" style="display:none"></div>
    </div>
  </div>
</div>

<div class="popup" id="popup"></div>
<div id="toasts"></div>

<script>
// ── CONNECTION — hardcoded, no login needed ───────────────────
const API_URL    = "https://script.google.com/macros/s/AKfycbyShUIbOiNKFMBZgufFW8uQgq7SLTrTz40ZKWyTjfnhlELN1BVWtt5Xcn1utr4Xhdb7/exec";
const API_SECRET = "959199767";

const OPTS = [
  { label: "Present + Full HW",      color: "#00b050", cls: "att-g", short: "✓ Full HW" },
  { label: "Present + Not Full H/W", color: "#e6ac00", cls: "att-y", short: "~ Partial"  },
  { label: "Absent / No Show",       color: "#e03333", cls: "att-r", short: "✗ Absent"   },
];

let G = {}, S = {}, currentGroup = null, currentCol = null, popCtx = {};

// ── BOOT ─────────────────────────────────────────────────────
window.onload = () => loadData();

// ── API — GET only, no CORS issues ───────────────────────────
function api(params) {
  const qs  = new URLSearchParams({ secret: API_SECRET, ...params }).toString();
  return fetch(API_URL + "?" + qs).then(r => {
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  });
}

// ── LOAD ─────────────────────────────────────────────────────
async function loadData() {
  showOverlay("Connecting to Google Sheet…");
  setStatus("loading");
  try {
    const [dr, sr] = await Promise.all([
      api({ action: "getAll" }),
      api({ action: "getSettings" })
    ]);
    if (dr.error) throw new Error(dr.error);
    G = dr.groups || {};
    S = sr.settings || {};
    buildSidebar();
    const first = Object.keys(G)[0];
    if (first) selectGroup(first);
    hideOverlay();
    document.getElementById("app").style.display = "block";
    setStatus("live");
    toast("Connected ✓", "ok");
  } catch(e) {
    hideOverlay();
    setStatus("err");
    document.getElementById("app").style.display = "block";
    document.getElementById("view-group").innerHTML =
      `<div style="padding:40px;text-align:center;color:var(--red)">
        ❌ Could not connect to Google Sheet<br>
        <span style="color:var(--muted);font-size:12px;margin-top:8px;display:block">${e.message}</span>
        <br><button class="btn btn-ghost" onclick="loadData()" style="margin-top:12px">↻ Try Again</button>
      </div>`;
    toast("Connection failed: " + e.message, "err");
  }
}

function reload() { currentCol = null; loadData(); }

// ── SIDEBAR ──────────────────────────────────────────────────
function buildSidebar() {
  const el = document.getElementById("grp-list");
  el.innerHTML = "";
  Object.keys(G).forEach(name => {
    const tag = G[name].type === "odd" ? "M/W/F" : "T/Th/S";
    const b   = document.createElement("button");
    b.className = "sb-btn";
    b.id = "sb-" + name.replace(" ","");
    b.onclick = () => selectGroup(name);
    b.innerHTML = `<span>${name}</span><span class="sb-tag">${tag}</span>`;
    el.appendChild(b);
  });
}

// ── SELECT GROUP ─────────────────────────────────────────────
function selectGroup(name) {
  currentGroup = name;
  currentCol   = null;
  document.querySelectorAll(".sb-btn").forEach(b => b.classList.remove("active"));
  const b = document.getElementById("sb-" + name.replace(" ",""));
  if (b) b.classList.add("active");
  document.querySelectorAll(".sb-nav").forEach(b => b.classList.remove("active"));
  showView("group");
  renderGroup(name);
}

// ── RENDER GROUP ─────────────────────────────────────────────
function renderGroup(name) {
  const g = G[name];
  if (!g) return;
  const todayNum = String(new Date().getDate());

  if (!currentCol) {
    const td = g.dates.find(d => (d.label.split("\n")[1]||"").trim() === todayNum);
    currentCol = td ? td.col : (g.dates[g.dates.length-1]?.col || null);
  }

  const selCol  = currentCol;
  const selDate = g.dates.find(d => d.col === selCol);
  const dateLbl = selDate ? selDate.label.replace("\n"," ") : "—";
  const students = g.students;

  const pFull = students.filter(s => s.attendance[selCol] === "Present + Full HW").length;
  const pPart = students.filter(s => s.attendance[selCol] === "Present + Not Full H/W").length;
  const abs   = students.filter(s => s.attendance[selCol] === "Absent / No Show").length;
  const empty = students.filter(s => !s.attendance[selCol]).length;

  const chips = g.dates.map(d => {
    const parts = d.label.split("\n");
    const isToday  = (parts[1]||"").trim() === todayNum;
    const isActive = d.col === selCol;
    return `<button class="dc${isActive?" active":""}${isToday&&!isActive?" today":""}"
      onclick="pickDate('${name}',${d.col})">${parts[0]||""}<br><b>${parts[1]||""}</b></button>`;
  }).join("");

  const rows = students.map((s,i) => {
    const att = s.attendance[selCol] || "";
    const opt = OPTS.find(o => o.label === att);
    return `<tr>
      <td style="color:var(--muted)">${i+1}</td>
      <td><span class="sname editable" onclick="editField('${name}',${s.row},this,'name')">${esc(s.name)}</span></td>
      <td><span class="sphone editable" onclick="editField('${name}',${s.row},this,'phone')">${esc(s.phone||"—")}</span></td>
      <td style="color:var(--muted);font-size:11px;font-style:italic">${esc(s.notes||"")}</td>
      <td><button class="att ${opt?opt.cls:"att-e"}"
        onclick="openPopup(event,'${name}',${s.row},${selCol},this)">${opt?opt.short:"— empty"}</button></td>
    </tr>`;
  }).join("");

  document.getElementById("view-group").innerHTML = `
    <div class="ph">
      <div>
        <div class="ph-title">${name}</div>
        <div class="ph-sub">${g.type==="odd"?"Mon · Wed · Fri":"Tue · Thu · Sat"}</div>
      </div>
      <button class="btn btn-green" onclick="toggleSend()">▶ Send Notifications</button>
    </div>

    <div class="send-panel" id="send-panel" style="display:none">
      <div class="send-row">
        <div class="send-stats">
          <span style="color:var(--muted);font-size:12px">📅 <b style="color:var(--text)">${dateLbl}</b></span>
          <span class="sc sc-g">✓ ${pFull}</span>
          <span class="sc sc-y">~ ${pPart}</span>
          <span class="sc sc-r">✗ ${abs}</span>
          <span class="sc sc-e">? ${empty}</span>
        </div>
        <button class="btn btn-green" id="send-btn"
          onclick="doSend('${name}',${selCol},'${dateLbl}')">
          ▶ Send ${students.length - empty} msgs
        </button>
        <button class="btn btn-ghost" onclick="toggleSend()">✕</button>
      </div>
      <div id="send-result"></div>
    </div>

    <div class="date-bar">${chips}</div>

    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>#</th><th>Full Name</th><th>Phone</th><th>Notes</th><th>${dateLbl}</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function pickDate(name, col) { currentCol = col; renderGroup(name); }

function toggleSend() {
  const p = document.getElementById("send-panel");
  if (p) p.style.display = p.style.display === "none" ? "block" : "none";
}

// ── SEND ─────────────────────────────────────────────────────
async function doSend(name, col, dateLbl) {
  const btn = document.getElementById("send-btn");
  const res_div = document.getElementById("send-result");
  btn.disabled = true;
  btn.innerHTML = '<span class="sp-sm"></span> Sending…';
  res_div.innerHTML = "";
  try {
    const res = await api({ action:"sendGroup", group:name, col, dateLabel:dateLbl });
    if (res.error) throw new Error(res.error);
    res_div.innerHTML = `<span style="color:var(--green)">✅ Sent: ${res.sent} | Skipped: ${res.skipped}</span>`;
    toast(`✅ ${res.sent} messages sent!`, "ok");
  } catch(e) {
    res_div.innerHTML = `<span style="color:var(--red)">❌ ${e.message}</span>`;
    toast("Send failed: " + e.message, "err");
  }
  btn.disabled = false;
  btn.innerHTML = "▶ Send";
}

// ── ATTENDANCE POPUP ─────────────────────────────────────────
function openPopup(event, grp, row, col, el) {
  event.stopPropagation();
  popCtx = { grp, row, col, el };
  const popup = document.getElementById("popup");
  popup.innerHTML = OPTS.map(o =>
    `<button class="pop-opt" style="background:${o.color}"
      onclick="setAtt('${o.label.replace(/'/g,"\\'")}')"> ${o.label}</button>`
  ).join("") +
  `<button class="pop-opt pop-clear" onclick="setAtt('')">✕ Clear</button>`;
  const r = el.getBoundingClientRect();
  popup.style.left = Math.min(r.left, window.innerWidth - 250) + "px";
  popup.style.top  = (r.bottom + 5) + "px";
  popup.classList.add("show");
}

document.addEventListener("click", () => document.getElementById("popup").classList.remove("show"));

async function setAtt(val) {
  document.getElementById("popup").classList.remove("show");
  const { grp, row, col, el } = popCtx;
  const opt = OPTS.find(o => o.label === val);
  el.className = "att " + (opt ? opt.cls : "att-e");
  el.textContent = opt ? opt.short : "— empty";
  el.onclick = (e) => openPopup(e, grp, row, col, el);
  const student = G[grp]?.students.find(s => s.row === row);
  if (student) student.attendance[col] = val;
  try {
    await api({ action:"updateAttendance", group:grp, row, col, value:val });
  } catch(e) { toast("Save failed", "err"); }
}

// ── INLINE EDIT ──────────────────────────────────────────────
function editField(grp, row, el, field) {
  const cur = el.textContent === "—" ? "" : el.textContent;
  const inp = document.createElement("input");
  inp.className = "inline-inp";
  inp.value = cur;
  el.replaceWith(inp);
  inp.focus();
  const save = async () => {
    const val = inp.value.trim();
    const ne  = document.createElement("span");
    ne.className = el.className;
    ne.textContent = val || "—";
    ne.onclick = () => editField(grp, row, ne, field);
    inp.replaceWith(ne);
    const student = G[grp]?.students.find(s => s.row === row);
    if (student) student[field] = val;
    try { await api({ action:"updateStudent", group:grp, row, [field]:val }); }
    catch(e) { toast("Save failed","err"); }
  };
  inp.addEventListener("blur", save);
  inp.addEventListener("keydown", e => {
    if (e.key==="Enter") inp.blur();
    if (e.key==="Escape"){ inp.value=cur; inp.blur(); }
  });
}

// ── LOGS ─────────────────────────────────────────────────────
async function renderLogs() {
  const view = document.getElementById("view-logs");
  view.innerHTML = `<div class="ph"><div><div class="ph-title">Send Logs</div><div class="ph-sub">Last 20 batches</div></div></div><p style="color:var(--muted)">Loading…</p>`;
  try {
    const res = await api({ action:"getLogs" });
    const logs = res.logs || [];
    if (!logs.length) { view.querySelector("p").textContent = "No logs yet — send some notifications first."; return; }
    const html = logs.map(log => {
      const time  = log.time ? new Date(log.time).toLocaleString() : "";
      const items = (log.log||[]).map(l => {
        const opt = OPTS.find(o => o.label === l.attendance);
        return `<span class="att ${opt?opt.cls:"att-e"}" style="cursor:default;font-size:11px">${esc(l.name)}</span>`;
      }).join("");
      return `<div class="log-card">
        <div class="log-head">
          <span class="log-grp">${log.group}</span>
          <span class="log-date">${log.date}</span>
          <span class="log-time">${time}</span>
        </div>
        <div class="log-body">${items||'<span style="color:var(--muted);font-size:12px">Empty batch</span>'}</div>
      </div>`;
    }).join("");
    view.innerHTML = `<div class="ph"><div><div class="ph-title">Send Logs</div><div class="ph-sub">Last 20 batches</div></div></div>${html}`;
  } catch(e) {
    view.innerHTML += `<p style="color:var(--red)">Error: ${e.message}</p>`;
  }
}

// ── SETTINGS ─────────────────────────────────────────────────
function renderSettings() {
  const s = S;
  document.getElementById("view-settings").innerHTML = `
    <div class="ph"><div><div class="ph-title">Settings</div><div class="ph-sub">Syncs directly to Google Sheet</div></div></div>
    <div class="set-grid">
      <div class="set-sec">
        <h3>📱 SMS Gate</h3>
        <div class="set-row"><label>URL</label><input id="s-url" value="${esc(s.smsGateUrl||"")}"></div>
        <div class="set-row"><label>Login</label><input id="s-log" value="${esc(s.smsGateLogin||"")}"></div>
        <div class="set-row"><label>Password</label><input id="s-pwd" type="password" value="${esc(s.smsGatePassword||"")}"></div>
        <div class="set-row"><label>SIM Slot</label><input id="s-sim" value="${esc(s.smsSimSlot||"1")}" style="width:50px"></div>
        <button class="btn btn-blue" style="margin-top:4px" onclick="saveSMS()">Save SMS</button>
      </div>
      <div class="set-sec">
        <h3>✈️ Telegram</h3>
        <div class="set-row"><label>Bot Token</label><input id="s-tok" value="${esc(s.botToken||"")}"></div>
        ${(s.chatIds||[]).map((c,i)=>`
          <div class="set-row"><label>${c.group}</label><input id="s-cid-${i}" value="${esc(c.chatId||"")}"></div>
        `).join("")}
        <button class="btn btn-blue" style="margin-top:4px" onclick="saveTG()">Save Telegram</button>
      </div>
      <div class="set-sec" style="grid-column:1/-1">
        <h3>💬 Message Templates</h3>
        <p style="color:var(--muted);font-size:11px;margin-bottom:14px">Use <code style="color:var(--accent)">{name}</code> and <code style="color:var(--accent)">{date}</code> as placeholders</p>
        ${Object.entries(s.messages||{}).map(([key,val])=>`
          <div class="field">
            <label>${key}</label>
            <input id="msg-${key.replace(/[^a-z0-9]/gi,'_')}" value="${esc(val)}">
          </div>
        `).join("")}
        <button class="btn btn-blue" onclick="saveMsgs()">Save Messages</button>
      </div>
    </div>`;
}

async function saveSMS() {
  try {
    await Promise.all([
      api({ action:"updateSetting", key:"SMS Gate URL",      value: v("s-url") }),
      api({ action:"updateSetting", key:"SMS Gate Login",    value: v("s-log") }),
      api({ action:"updateSetting", key:"SMS Gate Password", value: v("s-pwd") }),
      api({ action:"updateSetting", key:"SMS SIM Slot",      value: v("s-sim") }),
    ]);
    toast("SMS settings saved ✓","ok");
  } catch(e) { toast("Error: "+e.message,"err"); }
}

async function saveTG() {
  try {
    await api({ action:"updateSetting", key:"Bot Token", value: v("s-tok") });
    await Promise.all((S.chatIds||[]).map((c,i) =>
      api({ action:"updateSetting", key: c.group+" Chat ID", value: v("s-cid-"+i) })
    ));
    toast("Telegram settings saved ✓","ok");
  } catch(e) { toast("Error: "+e.message,"err"); }
}

async function saveMsgs() {
  try {
    await Promise.all(Object.keys(S.messages||{}).map(key => {
      const id  = "msg-" + key.replace(/[^a-z0-9]/gi,"_");
      const val = document.getElementById(id)?.value || S.messages[key];
      return api({ action:"updateSetting", key:"Msg: "+key, value: val });
    }));
    toast("Messages saved ✓","ok");
  } catch(e) { toast("Error: "+e.message,"err"); }
}

// ── VIEWS ────────────────────────────────────────────────────
function showView(name) {
  document.getElementById("view-group").style.display    = name==="group"    ? "block":"none";
  document.getElementById("view-logs").style.display     = name==="logs"     ? "block":"none";
  document.getElementById("view-settings").style.display = name==="settings" ? "block":"none";
  document.querySelectorAll(".sb-nav").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".sb-btn").forEach(b => { if(name!=="group") b.classList.remove("active"); });
  if (name==="logs")     { document.getElementById("nav-logs").classList.add("active");     renderLogs(); }
  if (name==="settings") { document.getElementById("nav-settings").classList.add("active"); renderSettings(); }
}

// ── UTILS ────────────────────────────────────────────────────
function setStatus(s) {
  const dot = document.getElementById("dot");
  const txt = document.getElementById("status-txt");
  dot.className = "live-dot" + (s==="live"?" on": s==="err"?" err":"");
  txt.textContent = s==="live"?"Live": s==="loading"?"Syncing…":"Connection error";
}
function showOverlay(msg) {
  document.getElementById("overlay").style.display="flex";
  document.getElementById("overlay-txt").textContent = msg;
}
function hideOverlay() { document.getElementById("overlay").style.display="none"; }
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function v(id)  { return document.getElementById(id)?.value||""; }
function toast(msg, type="inf") {
  const el = document.createElement("div");
  el.className = "toast "+type; el.textContent = msg;
  document.getElementById("toasts").appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}
</script>

</html>
