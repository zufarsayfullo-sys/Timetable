<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group 6 Management | Full CRUD + Notifications</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1600px; margin: 0 auto; }
        
        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .sync-status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .sync-success { background: #d4edda; color: #155724; }
        .sync-error { background: #f8d7da; color: #721c24; }
        .sync-syncing { background: #fff3cd; color: #856404; }
        
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
        }
        
        /* Tabs */
        .main-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .main-tab {
            background: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .main-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
        }
        
        .day-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .day-tab {
            flex: 1;
            background: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .day-tab.odd.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .day-tab.even.active { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        
        /* Groups Grid */
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .group-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .group-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .group-content { padding: 20px; display: none; }
        .group-content.active { display: block; }
        
        /* Tables */
        .students-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .students-table th {
            background: #f8f9fa;
            padding: 10px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #dee2e6;
        }
        
        .students-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #e9ecef;
        }
        
        .students-table tr:hover { background: #f8f9fa; }
        
        /* Attendance Buttons */
        .attendance-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        
        .attendance-btn {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .btn-present { background: #d4edda; color: #155724; }
        .btn-present.active { background: #28a745; color: white; }
        .btn-absent { background: #f8d7da; color: #721c24; }
        .btn-absent.active { background: #dc3545; color: white; }
        .btn-late { background: #fff3cd; color: #856404; }
        .btn-late.active { background: #ffc107; color: #333; }
        
        /* Buttons */
        .btn-add, .btn-save, .btn-notify, .btn-delete {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin: 5px;
        }
        
        .btn-add { background: #28a745; color: white; }
        .btn-save { background: #17a2b8; color: white; }
        .btn-notify { background: #ffc107; color: #333; }
        .btn-delete { background: #dc3545; color: white; }
        
        .delete-student-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        
        /* Notifications Panel */
        .notifications-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .notification-item {
            padding: 12px;
            border-left: 4px solid #667eea;
            background: #f8f9fa;
            margin-bottom: 10px;
            border-radius: 8px;
        }
        
        .notification-message { font-weight: 500; margin-bottom: 5px; }
        .notification-meta { font-size: 11px; color: #666; }
        
        .send-notification-form {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        .editable-input {
            width: 100%;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .loading-overlay.active { display: flex; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .groups-grid { grid-template-columns: 1fr; }
            .attendance-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Group 6 Management System</h1>
            <div id="syncStatus" class="sync-status sync-success">✅ Connected to Google Sheets</div>
            <div class="stats-bar" id="statsBar">
                <div class="stat">Total Students: <span id="totalStudents">0</span></div>
                <div class="stat">Today's Present: <span id="todayPresent">0</span></div>
                <div class="stat">Today's Absent: <span id="todayAbsent">0</span></div>
                <div class="stat">Today's Late: <span id="todayLate">0</span></div>
            </div>
        </div>
        
        <div class="main-tabs">
            <button class="main-tab active" onclick="switchMainTab('attendance', this)">📅 Attendance</button>
            <button class="main-tab" onclick="switchMainTab('notifications', this)">📨 Notifications</button>
            <button class="main-tab" onclick="switchMainTab('reports', this)">📊 Reports</button>
        </div>
        
        <!-- Attendance Tab -->
        <div id="attendanceTab">
            <div class="day-tabs">
                <button class="day-tab odd active" onclick="switchDay('odd', this)">📅 ODD DAYS</button>
                <button class="day-tab even" onclick="switchDay('even', this)">📅 EVEN DAYS</button>
            </div>
            <div class="groups-grid" id="groupsGrid">Loading...</div>
            <button class="btn-save" onclick="syncAllToSheet()" style="width: 100%; padding: 15px;">💾 SYNC ALL TO GOOGLE SHEETS</button>
        </div>
        
        <!-- Notifications Tab -->
        <div id="notificationsTab" style="display: none;">
            <div class="notifications-panel">
                <h3>📨 Recent Notifications</h3>
                <div id="notificationsList">Loading...</div>
                
                <div class="send-notification-form">
                    <h4>Send New Notification</h4>
                    <div class="form-group">
                        <label>Recipient Type</label>
                        <select id="recipientType" onchange="updateRecipientField()">
                            <option value="all">All Students</option>
                            <option value="group">Specific Group</option>
                            <option value="student">Specific Student</option>
                            <option value="parents">All Parents</option>
                        </select>
                    </div>
                    <div class="form-group" id="recipientSelectGroup" style="display: none;">
                        <label>Select Group</label>
                        <select id="groupSelect"></select>
                    </div>
                    <div class="form-group" id="recipientSelectStudent" style="display: none;">
                        <label>Select Student</label>
                        <select id="studentSelect"></select>
                    </div>
                    <div class="form-group">
                        <label>Notification Type</label>
                        <select id="notificationType">
                            <option value="reminder">Reminder</option>
                            <option value="attendance_alert">Attendance Alert</option>
                            <option value="announcement">Announcement</option>
                            <option value="payment">Payment Reminder</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea id="notificationMessage" rows="3" placeholder="Type your message here..."></textarea>
                    </div>
                    <button class="btn-notify" onclick="sendNotification()">📨 Send Notification</button>
                </div>
            </div>
        </div>
        
        <!-- Reports Tab -->
        <div id="reportsTab" style="display: none;">
            <div class="notifications-panel">
                <h3>📊 Attendance Reports</h3>
                <div class="form-group">
                    <label>Select Date Range</label>
                    <input type="date" id="reportStartDate">
                    <input type="date" id="reportEndDate" style="margin-top: 10px;">
                    <button class="btn-save" onclick="generateReport()" style="margin-top: 10px;">Generate Report</button>
                </div>
                <div id="reportResults"></div>
            </div>
        </div>
    </div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div style="color: white; margin-top: 20px;">Syncing with Google Sheets...</div>
    </div>
    
    <script>
        // Configuration
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/YOUR_WEB_APP_ID/exec';
        
        // Data stores
        let groups = { odd: [], even: [] };
        let students = [];
        let attendanceData = {};
        let notifications = [];
        let currentDay = 'odd';
        let currentMainTab = 'attendance';
        
        // ==================== LOAD DATA ====================
        async function loadAllData() {
            showLoading(true);
            updateSyncStatus('syncing', 'Loading from Google Sheets...');
            
            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAllData`);
                const result = await response.json();
                
                if (result.success) {
                    processLoadedData(result.data);
                    updateSyncStatus('success', '✅ Connected to Google Sheets');
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                console.error('Error:', error);
                updateSyncStatus('error', '⚠️ Using local data - Connect to Google Sheets');
                loadSampleData();
            }
            
            showLoading(false);
        }
        
        function processLoadedData(data) {
            // Process groups
            groups = { odd: [], even: [] };
            data.groups.forEach(group => {
                const groupObj = {
                    id: group.id,
                    name: group.name,
                    students: [],
                    lessons: ['L1', 'L2', 'L3', 'L4', 'L5']
                };
                groups[group.dayType].push(groupObj);
            });
            
            // Process students
            students = data.students || [];
            students.forEach(student => {
                for (let dayType of ['odd', 'even']) {
                    const group = groups[dayType].find(g => g.id === student.groupId);
                    if (group) {
                        group.students.push({
                            id: student.id,
                            name: student.name,
                            phone: student.phone,
                            parentName: student.parentName,
                            parentPhone: student.parentPhone
                        });
                    }
                }
            });
            
            // Process attendance
            attendanceData = data.attendance || {};
            notifications = data.notifications || [];
            
            renderGroups();
            updateStats();
            updateNotificationSelectors();
        }
        
        // ==================== RENDER FUNCTIONS ====================
        function renderGroups() {
            const grid = document.getElementById('groupsGrid');
            const currentGroups = groups[currentDay];
            
            if (!currentGroups || currentGroups.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 50px;">No groups found</div>';
                return;
            }
            
            grid.innerHTML = currentGroups.map((group, groupIdx) => `
                <div class="group-card">
                    <div class="group-header" onclick="toggleGroup(${groupIdx})">
                        <h2>${group.name}</h2>
                        <div class="group-badge">${group.students.length} students</div>
                    </div>
                    <div class="group-content" id="group${groupIdx}">
                        <div class="students-table-wrapper">
                            <table class="students-table">
                                <thead>
                                    <tr><th>#</th><th>Student Name</th><th>Phone</th><th>Parent Contact</th>${group.lessons.map(l => `<th>${l}</th>`).join('')}<th>Actions</th></tr>
                                </thead>
                                <tbody>
                                    ${group.students.map((student, studentIdx) => {
                                        const today = new Date().toISOString().split('T')[0];
                                        const key = `${group.id}_${student.id}_${today}`;
                                        const attendance = attendanceData[key] || {};
                                        
                                        return `
                                            <tr>
                                                <td>${studentIdx + 1}</td>
                                                <td><input type="text" class="editable-input" value="${escapeHtml(student.name)}" onchange="updateStudentField('${currentDay}', ${groupIdx}, ${student.id}, 'name', this.value)"></td>
                                                <td><input type="text" class="editable-input" value="${student.phone}" onchange="updateStudentField('${currentDay}', ${groupIdx}, ${student.id}, 'phone', this.value)"></td>
                                                <td><input type="text" class="editable-input" value="${student.parentPhone || ''}" placeholder="Parent phone" onchange="updateStudentField('${currentDay}', ${groupIdx}, ${student.id}, 'parentPhone', this.value)"></td>
                                                ${group.lessons.map((_, lessonIdx) => {
                                                    const status = attendance[`lesson${lessonIdx + 1}`] || 'present';
                                                    return `
                                                        <td>
                                                            <div class="attendance-buttons">
                                                                <button class="attendance-btn btn-present ${status === 'present' ? 'active' : ''}" onclick="setAttendance('${currentDay}', ${groupIdx}, ${student.id}, ${lessonIdx + 1}, 'present', this)">P</button>
                                                                <button class="attendance-btn btn-absent ${status === 'absent' ? 'active' : ''}" onclick="setAttendance('${currentDay}', ${groupIdx}, ${student.id}, ${lessonIdx + 1}, 'absent', this)">A</button>
                                                                <button class="attendance-btn btn-late ${status === 'late' ? 'active' : ''}" onclick="setAttendance('${currentDay}', ${groupIdx}, ${student.id}, ${lessonIdx + 1}, 'late', this)">L</button>
                                                            </div>
                                                        </td>
                                                    `;
                                                }).join('')}
                                                <td>
                                                    <button class="delete-student-btn" onclick="deleteStudent('${currentDay}', ${groupIdx}, ${student.id}, '${student.name}')">🗑️ Delete</button>
                                                    <button class="delete-student-btn" style="background: #ffc107; color: #333;" onclick="notifyStudent('${student.id}', '${student.name}', '${student.phone}')">📨 Notify</button>
                                                </td>
                                             </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                        
                        <div class="add-student-form">
                            <div class="form-row" style="display: flex; gap: 10px;">
                                <input type="text" id="newStudentName_${groupIdx}" placeholder="Student Name" style="flex: 2;">
                                <input type="text" id="newStudentPhone_${groupIdx}" placeholder="Phone" style="flex: 1;">
                                <input type="text" id="newStudentParentPhone_${groupIdx}" placeholder="Parent Phone" style="flex: 1;">
                                <button class="btn-add" onclick="addStudent('${currentDay}', ${groupIdx})">+ Add</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // ==================== CRUD OPERATIONS ====================
        async function updateStudentField(dayType, groupIdx, studentId, field, value) {
            const group = groups[dayType][groupIdx];
            const student = group.students.find(s => s.id === studentId);
            
            if (student) {
                student[field] = value;
                showLoading(true);
                
                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'updateStudent',
                            student: {
                                id: studentId,
                                name: group.students.find(s => s.id === studentId).name,
                                phone: group.students.find(s => s.id === studentId).phone,
                                parentName: group.students.find(s => s.id === studentId).parentName,
                                parentPhone: group.students.find(s => s.id === studentId).parentPhone
                            }
                        })
                    });
                    
                    updateSyncStatus('success', '✅ Student updated in Google Sheets');
                } catch (error) {
                    console.error('Error updating student:', error);
                }
                
                showLoading(false);
            }
        }
        
        async function addStudent(dayType, groupIdx) {
            const nameInput = document.getElementById(`newStudentName_${groupIdx}`);
            const phoneInput = document.getElementById(`newStudentPhone_${groupIdx}`);
            const parentPhoneInput = document.getElementById(`newStudentParentPhone_${groupIdx}`);
            
            const name = nameInput.value.trim();
            if (!name) {
                alert('Please enter student name');
                return;
            }
            
            const group = groups[dayType][groupIdx];
            const newId = Date.now();
            
            const newStudent = {
                id: newId,
                name: name,
                phone: phoneInput.value.trim() || '-',
                parentName: '',
                parentPhone: parentPhoneInput.value.trim() || '',
                groupId: group.id
            };
            
            group.students.push(newStudent);
            students.push(newStudent);
            
            showLoading(true);
            
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'addStudent',
                        student: newStudent
                    })
                });
                
                updateSyncStatus('success', '✅ Student added to Google Sheets');
            } catch (error) {
                console.error('Error adding student:', error);
            }
            
            nameInput.value = '';
            phoneInput.value = '';
            parentPhoneInput.value = '';
            
            renderGroups();
            updateStats();
            updateNotificationSelectors();
            showLoading(false);
        }
        
        async function deleteStudent(dayType, groupIdx, studentId, studentName) {
            if (!confirm(`Are you sure you want to delete ${studentName}? This will move the record to archive.`)) {
                return;
            }
            
            const group = groups[dayType][groupIdx];
            const studentIndex = group.students.findIndex(s => s.id === studentId);
            
            if (studentIndex > -1) {
                group.students.splice(studentIndex, 1);
                
                showLoading(true);
                
                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'deleteStudent',
                            studentId: studentId,
                            reason: `Deleted by user on ${new Date().toLocaleString()}`
                        })
                    });
                    
                    updateSyncStatus('success', '✅ Student deleted from Google Sheets');
                } catch (error) {
                    console.error('Error deleting student:', error);
                }
                
                renderGroups();
                updateStats();
                updateNotificationSelectors();
                showLoading(false);
            }
        }
        
        async function setAttendance(dayType, groupIdx, studentId, lessonNum, status, buttonElement) {
            const group = groups[dayType][groupIdx];
            const today = new Date().toISOString().split('T')[0];
            const key = `${group.id}_${studentId}_${today}`;
            
            if (!attendanceData[key]) {
                attendanceData[key] = {};
            }
            
            attendanceData[key][`lesson${lessonNum}`] = status;
            
            // Update button styles
            const buttons = buttonElement.parentElement.children;
            for (let btn of buttons) {
                btn.classList.remove('active');
            }
            buttonElement.classList.add('active');
            
            // Send to sheet
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'updateAttendance',
                        studentId: studentId,
                        groupId: group.id,
                        lessonNum: lessonNum,
                        status: status
                    })
                });
                
                // Auto-send notification for absent/late
                if (status === 'absent' || status === 'late') {
                    const student = group.students.find(s => s.id === studentId);
                    if (student && student.parentPhone) {
                        await sendAutoNotification(student, status, lessonNum);
                    }
                }
            } catch (error) {
                console.error('Error updating attendance:', error);
            }
            
            updateStats();
        }
        
        // ==================== NOTIFICATION SYSTEM ====================
        async function sendNotification() {
            const recipientType = document.getElementById('recipientType').value;
            const notificationType = document.getElementById('notificationType').value;
            const message = document.getElementById('notificationMessage').value;
            
            if (!message) {
                alert('Please enter a message');
                return;
            }
            
            let recipients = [];
            
            switch(recipientType) {
                case 'all':
                    recipients = students.map(s => ({ phone: s.phone, name: s.name }));
                    break;
                case 'parents':
                    recipients = students.filter(s => s.parentPhone).map(s => ({ phone: s.parentPhone, name: `${s.name}'s Parent` }));
                    break;
                case 'group':
                    const groupId = document.getElementById('groupSelect').value;
                    const group = [...groups.odd, ...groups.even].find(g => g.id === groupId);
                    if (group) {
                        recipients = group.students.map(s => ({ phone: s.parentPhone || s.phone, name: s.name }));
                    }
                    break;
                case 'student':
                    const studentId = parseInt(document.getElementById('studentSelect').value);
                    const student = students.find(s => s.id === studentId);
                    if (student) {
                        recipients = [{ phone: student.parentPhone || student.phone, name: student.name }];
                    }
                    break;
            }
            
            showLoading(true);
            
            for (const recipient of recipients) {
                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'sendNotification',
                            recipient: recipient.phone,
                            message: message,
                            type: notificationType,
                            studentId: recipientType === 'student' ? parseInt(document.getElementById('studentSelect').value) : null
                        })
                    });
                } catch (error) {
                    console.error('Error sending notification:', error);
                }
            }
            
            alert(`Notification sent to ${recipients.length} recipient(s)`);
            document.getElementById('notificationMessage').value = '';
            showLoading(false);
            loadNotifications();
        }
        
        async function sendAutoNotification(student, status, lessonNum) {
            const message = `⚠️ Attendance Alert: ${student.name} was marked ${status} for Lesson ${lessonNum} on ${new Date().toLocaleDateString()}. Please contact the teacher for more information.`;
            
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'sendNotification',
                        recipient: student.parentPhone,
                        message: message,
                        type: 'attendance_alert',
                        studentId: student.id
                    })
                });
            } catch (error) {
                console.error('Error sending auto notification:', error);
            }
        }
        
        function notifyStudent(studentId, studentName, phone) {
            document.getElementById('recipientType').value = 'student';
            updateRecipientField();
            setTimeout(() => {
                const studentSelect = document.getElementById('studentSelect');
                if (studentSelect) {
                    for (let i = 0; i < studentSelect.options.length; i++) {
                        if (studentSelect.options[i].value == studentId) {
                            studentSelect.selectedIndex = i;
                            break;
                        }
                    }
                }
                document.getElementById('notificationMessage').value = `Dear ${studentName}, this is a reminder from Group 6. Please check your attendance status.`;
                document.getElementById('notificationType').value = 'reminder';
                switchMainTab('notifications');
            }, 100);
        }
        
        async function loadNotifications() {
            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getNotifications`);
                const result = await response.json();
                
                if (result.success && result.data && result.data.notifications) {
                    const container = document.getElementById('notificationsList');
                    container.innerHTML = result.data.notifications.map(n => `
                        <div class="notification-item">
                            <div class="notification-message">${escapeHtml(n.message)}</div>
                            <div class="notification-meta">
                                To: ${n.recipient} | Type: ${n.type} | Status: ${n.status} | ${new Date(n.timestamp).toLocaleString()}
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading notifications:', error);
            }
        }
        
        // ==================== SYNC FUNCTIONS ====================
        async function syncAllToSheet() {
            showLoading(true);
            updateSyncStatus('syncing', 'Saving to Google Sheets...');
            
            const allStudents = [];
            const allAttendance = {};
            
            ['odd', 'even'].forEach(dayType => {
                groups[dayType].forEach(group => {
                    group.students.forEach(student => {
                        allStudents.push({
                            id: student.id,
                            name: student.name,
                            phone: student.phone,
                            parentName: student.parentName || '',
                            parentPhone: student.parentPhone || '',
                            groupId: group.id,
                            status: 'active'
                        });
                        
                        const today = new Date().toISOString().split('T')[0];
                        const key = `${group.id}_${student.id}_${today}`;
                        if (attendanceData[key]) {
                            allAttendance[key] = attendanceData[key];
                        }
                    });
                });
            });
            
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'saveAllData',
                        students: allStudents,
                        attendance: allAttendance
                    })
                });
                
                updateSyncStatus('success', '✅ All data saved to Google Sheets!');
            } catch (error) {
                console.error('Error saving:', error);
                updateSyncStatus('error', '⚠️ Failed to save to Google Sheets');
            }
            
            showLoading(false);
        }
        
        // ==================== UTILITY FUNCTIONS ====================
        function toggleGroup(groupIdx) {
            const content = document.getElementById(`group${groupIdx}`);
            if (content) content.classList.toggle('active');
        }
        
        function switchDay(day, buttonElement) {
            currentDay = day;
            document.querySelectorAll('.day-tab').forEach(tab => tab.classList.remove('active'));
            buttonElement.classList.add('active');
            renderGroups();
        }
        
        function switchMainTab(tab, buttonElement) {
            currentMainTab = tab;
            document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
            if (buttonElement) buttonElement.classList.add('active');
            
            document.getElementById('attendanceTab').style.display = tab === 'attendance' ? 'block' : 'none';
            document.getElementById('notificationsTab').style.display = tab === 'notifications' ? 'block' : 'none';
            document.getElementById('reportsTab').style.display = tab === 'reports' ? 'block' : 'none';
            
            if (tab === 'notifications') loadNotifications();
            if (tab === 'reports') updateStats();
        }
        
        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            let totalStudents = 0;
            let present = 0, absent = 0, late = 0;
            
            ['odd', 'even'].forEach(dayType => {
                groups[dayType].forEach(group => {
                    totalStudents += group.students.length;
                    group.students.forEach(student => {
                        const key = `${group.id}_${student.id}_${today}`;
                        const attendance = attendanceData[key];
                        if (attendance && attendance.lesson1) {
                            if (attendance.lesson1 === 'present') present++;
                            else if (attendance.lesson1 === 'absent') absent++;
                            else if (attendance.lesson1 === 'late') late++;
                        } else {
                            present++;
                        }
                    });
                });
            });
            
            document.getElementById('totalStudents').textContent = totalStudents;
            document.getElementById('todayPresent').textContent = present;
            document.getElementById('todayAbsent').textContent = absent;
            document.getElementById('todayLate').textContent = late;
        }
        
        function updateNotificationSelectors() {
            const groupSelect = document.getElementById('groupSelect');
            const studentSelect = document.getElementById('studentSelect');
            
            if (groupSelect) {
                const allGroups = [...groups.odd, ...groups.even];
                groupSelect.innerHTML = allGroups.map(g => `<option value="${g.id}">${g.name} (${g.students.length} students)</option>`).join('');
            }
            
            if (studentSelect) {
                const allStudents = [];
                [...groups.odd, ...groups.even].forEach(g => {
                    g.students.forEach(s => {
                        allStudents.push({ id: s.id, name: s.name, group: g.name });
                    });
                });
                studentSelect.innerHTML = allStudents.map(s => `<option value="${s.id}">${s.name} (${s.group})</option>`).join('');
            }
        }
        
        function updateRecipientField() {
            const type = document.getElementById('recipientType').value;
            document.getElementById('recipientSelectGroup').style.display = type === 'group' ? 'block' : 'none';
            document.getElementById('recipientSelectStudent').style.display = type === 'student' ? 'block' : 'none';
        }
        
        function generateReport() {
            const startDate = document.getElementById('reportStartDate').value;
            const endDate = document.getElementById('reportEndDate').value;
            
            if (!startDate || !endDate) {
                alert('Please select date range');
                return;
            }
            
            // Simple report generation
            let report = '<h4>Attendance Summary</h4>';
            report += '<table class="students-table"><tr><th>Student</th><th>Group</th><th>Present %</th></tr>';
            
            [...groups.odd, ...groups.even].forEach(group => {
                group.students.forEach(student => {
                    report += `<tr><td>${student.name}</td><td>${group.name}</td><td>Calculating...</td></tr>`;
                });
            });
            
            report += '</table>';
            document.getElementById('reportResults').innerHTML = report;
        }
        
        function updateSyncStatus(type, message) {
            const statusDiv = document.getElementById('syncStatus');
            statusDiv.textContent = message;
            statusDiv.className = `sync-status sync-${type}`;
        }
        
        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('active', show);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function loadSampleData() {
            groups.odd = [
                { id: 'odd1', name: 'Group O1 - Morning', students: [
                    { id: 1, name: 'Saydullayev Sanjar', phone: '773961171', parentPhone: '901234567' }
                ], lessons: ['L1', 'L2', 'L3', 'L4', 'L5'] },
                { id: 'odd2', name: 'Group O2 - Afternoon', students: [], lessons: ['L1', 'L2', 'L3', 'L4', 'L5'] },
                { id: 'odd3', name: 'Group O3 - Evening', students: [], lessons: ['L1', 'L2', 'L3', 'L4', 'L5'] }
            ];
            groups.even = [
                { id: 'even1', name: 'Group E1 - Morning', students: [
                    { id: 2, name: 'Ravshanov Ruslan', phone: '335376070', parentPhone: '902345678' }
                ], lessons: ['L1', 'L2', 'L3', 'L4', 'L5'] },
                { id: 'even2', name: 'Group E2 - Afternoon', students: [], lessons: ['L1', 'L2', 'L3', 'L4', 'L5'] },
                { id: 'even3', name: 'Group E3 - Evening', students: [], lessons: ['L1', 'L2', 'L3', 'L4', 'L5'] }
            ];
            renderGroups();
            updateStats();
        }
        
        // Initialize
        loadAllData();
    </script>
</body>
