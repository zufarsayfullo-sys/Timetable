<html lang="en">

            color: #e2e8f0;
        }
        .app { max-width: 1600px; margin: 0 auto; padding: 20px; }
        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px 28px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.15);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            color: #10b981;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-value { font-size: 28px; font-weight: 700; color: white; }
        .stat-label { font-size: 12px; color: #94a3b8; margin-top: 4px; }
        .day-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 28px;
        }
        .day-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(59, 130, 246, 0.02));
            border-radius: 20px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(59, 130, 246, 0.2);
            text-align: center;
        }
        .day-card.even {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(245, 158, 11, 0.02));
            border-color: rgba(245, 158, 11, 0.2);
        }
        .day-card:hover { transform: translateY(-3px); }
        .day-icon { font-size: 48px; margin-bottom: 8px; }
        .day-card h2 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
        .day-card p { color: #94a3b8; font-size: 13px; }
        .group-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .group-tab {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .group-tab.active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-color: transparent;
            color: white;
        }
        .group-count {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
        }
        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3); }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 24px;
            border-radius: 40px;
            color: #e2e8f0;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .table-container {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 20px;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-height: 70vh;
            overflow-y: auto;
        }
        .attendance-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            min-width: 800px;
        }
        .attendance-table th {
            background: rgba(0, 0, 0, 0.6);
            padding: 14px 10px;
            text-align: center;
            font-weight: 600;
            color: #cbd5e1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .attendance-table td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .student-name-cell {
            text-align: left;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.3);
            position: sticky;
            left: 0;
            z-index: 5;
        }
        .attn-btn {
            padding: 5px 10px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            margin: 2px;
            transition: all 0.15s;
        }
        .attn-green { background: #00B050; color: white; }
        .attn-yellow { background: #FFC000; color: #1e293b; }
        .attn-red { background: #dc2626; color: white; }
        .action-icon {
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 14px;
            padding: 5px;
            margin: 0 3px;
            transition: color 0.2s;
        }
        .action-icon:hover { color: #3b82f6; }
        .action-icon.delete:hover { color: #dc2626; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1e293b;
            border-radius: 24px;
            padding: 28px;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .modal-content h3 { font-size: 22px; margin-bottom: 20px; }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 40px;
            background: #1e293b;
            color: white;
            font-weight: 500;
            font-size: 13px;
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .loading { text-align: center; padding: 50px; color: #94a3b8; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;

        .fab-add {

            right: 20px;

</div>

            <button class="btn-primary" id="modalSaveBtn">Save</button>

</div>

                    {"rowIndex": 17, "name": "Saydullayev Jasurbek", "phone": "998937200833", "notes": ""}
                ],
                "lessonDates": [{"col":5,"day":2,"weekday":"Thu"},{"col":6,"day":4,"weekday":"Sat"},{"col":7,"day":7,"weekday":"Tue"},{"col":8,"day":9,"weekday":"Thu"},{"col":9,"day":11,"weekday":"Sat"},{"col":10,"day":14,"weekday":"Tue"},{"col":11,"day":16,"weekday":"Thu"},{"col":12,"day":18,"weekday":"Sat"},{"col":13,"day":21,"weekday":"Tue"},{"col":14,"day":23,"weekday":"Thu"},{"col":15,"day":25,"weekday":"Sat"},{"col":16,"day":28,"weekday":"Tue"},{"col":17,"day":30,"weekday":"Thu"}]
            }
        ]
    };

    async function loadAllData() {
        showToast('Loading data...', 'info');
        document.getElementById('connectionStatus').innerHTML = '<i class="fas fa-circle" style="font-size: 8px;"></i> Loading...';
        
        try {
            // Try to fetch from Web App
            const response = await fetch(`${WEBAPP_URL}?action=getAllData`);
            const json = await response.json();
            
            if (json.success && json.data && json.data.groups) {
                allGroups = json.data.groups;
                showToast(`✅ Loaded ${getTotalStudents()} students from sheet`, 'success');
                document.getElementById('connectionStatus').innerHTML = '<i class="fas fa-circle" style="font-size: 8px;"></i> Connected to Sheet';
            } else {
                throw new Error('Using embedded data');
            }
        } catch (error) {
            console.log('Using embedded data as fallback');
            allGroups = EMBEDDED_DATA.groups;
            showToast(`⚠️ Using cached data - ${getTotalStudents()} students loaded`, 'warning');
            document.getElementById('connectionStatus').innerHTML = '<i class="fas fa-circle" style="font-size: 8px;"></i> Using Cached Data';
        }
        
        // Filter out any rows that are actually headers
        allGroups = allGroups.map(group => ({
            ...group,
            students: group.students.filter(s => 
                s.name !== 'Present + Full HW' && 
                s.name !== 'Present + Not Full H/W' &&
                !s.name.includes('Present')
            )
        }));
        
        updateStats();
        document.getElementById('syncTime').innerText = new Date().toLocaleTimeString();
    }

    function getTotalStudents() {
        return allGroups.reduce((sum, g) => sum + (g.students?.length || 0), 0);
    }

    function updateStats() {
        document.getElementById('totalStudents').innerText = getTotalStudents();
        document.getElementById('totalGroups').innerText = allGroups.length;
        document.getElementById('currentMonth').innerText = new Date().toLocaleString('default', { month: 'long' });
    }

    // ==================== UI RENDERING ====================
    function selectDay(dayType) {
        currentDayType = dayType;
        const groups = allGroups.filter(g => g.days === dayType);
        
        if (groups.length === 0) {
            document.getElementById('groupsSection').style.display = 'none';
            showToast('No groups for this day type', 'warning');
            return;
        }
        
        document.getElementById('groupsSection').style.display = 'block';
        renderGroupTabs(groups);
        
        if (groups.length > 0) {
            selectGroup(groups[0].name);
        }
    }

    function renderGroupTabs(groups) {
        const container = document.getElementById('groupTabs');
        container.innerHTML = groups.map(group => `
            <button class="group-tab ${currentGroup === group.name ? 'active' : ''}" data-group="${group.name}">
                <i class="fas fa-users"></i> ${group.name}
                <span class="group-count">${group.students?.length || 0}</span>
            </button>
        `).join('');
        
        document.querySelectorAll('.group-tab').forEach(btn => {
            btn.addEventListener('click', () => selectGroup(btn.dataset.group));
        });
    }

    function selectGroup(groupName) {
        currentGroup = groupName;
        currentGroupData = allGroups.find(g => g.name === groupName);
        
        document.querySelectorAll('.group-tab').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.group === groupName);
        });
        
        renderAttendanceTable();
    }

    function renderAttendanceTable() {
        if (!currentGroupData) return;
        
        const students = currentGroupData.students || [];
        const lessonDates = currentGroupData.lessonDates || [];
        
        if (students.length === 0) {
            document.getElementById('tableContainer').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-user-plus" style="font-size: 40px; margin-bottom: 12px; opacity: 0.5;"></i>
                    <p>No students in ${currentGroup}</p>
                    <button class="btn-primary" style="margin-top: 12px;" onclick="openAddModal()">+ Add First Student</button>
                </div>
            `;
            return;
        }
        
        let tableHtml = `
            <table class="attendance-table">
                <thead>
                    <tr>
                        <th style="min-width: 180px; position: sticky; left: 0; z-index: 20;">Student Name</th>
                        <th style="min-width: 100px;">Phone</th>
                        ${lessonDates.map(ld => `<th style="min-width: 100px;">${ld.weekday}<br>${ld.day}</th>`).join('')}
                        <th style="min-width: 80px;">Actions</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        students.forEach((student) => {
            if (!student.name || student.name === 'Present + Full HW') return;
            
            tableHtml += `
                <tr>
                    <td class="student-name-cell" style="position: sticky; left: 0;"><strong>${escapeHtml(student.name)}</strong></td>
                    <td>${escapeHtml(student.phone)}</td>
                    ${lessonDates.map(ld => `
                        <td>
                            <button class="attn-btn attn-green" onclick="markAttendance('${currentGroup}', ${student.rowIndex}, 'Present + Full HW', ${ld.day})">P</button>
                            <button class="attn-btn attn-yellow" onclick="markAttendance('${currentGroup}', ${student.rowIndex}, 'Present + Not Full H/W', ${ld.day})">P-</button>
                            <button class="attn-btn attn-red" onclick="markAttendance('${currentGroup}', ${student.rowIndex}, 'Absent / No Show', ${ld.day})">A</button>
                        </td>
                    `).join('')}
                    <td>
                        <button class="action-icon" onclick="openEditModal(${student.rowIndex}, '${escapeHtml(student.name)}', '${escapeHtml(student.phone)}')"><i class="fas fa-edit"></i></button>
                        <button class="action-icon delete" onclick="deleteStudent('${currentGroup}', ${student.rowIndex}, '${escapeHtml(student.name)}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `;
        });
        
        tableHtml += `</tbody></table>`;
        document.getElementById('tableContainer').innerHTML = tableHtml;
    }

    // ==================== ATTENDANCE & CRUD ====================
    async function markAttendance(groupName, rowIndex, status, day) {
        showToast(`Marked: ${status}`, 'success');
        // In production, this would save to your Web App
    }

    function openAddModal() {
        modalAction = 'add';
        document.getElementById('modalTitle').innerText = 'Add New Student';
        document.getElementById('studentName').value = '';
        document.getElementById('studentPhone').value = '';
        document.getElementById('studentModal').classList.add('active');
    }

    function openEditModal(rowIndex, name, phone) {
        modalAction = 'edit';
        selectedStudent = { rowIndex, name, phone };
        document.getElementById('modalTitle').innerText = 'Edit Student';
        document.getElementById('studentName').value = name;
        document.getElementById('studentPhone').value = phone;
        document.getElementById('studentModal').classList.add('active');
    }

    async function saveStudent() {
        const name = document.getElementById('studentName').value.trim();
        const phone = document.getElementById('studentPhone').value.trim();
        
        if (!name) {
            showToast('Please enter student name', 'error');
            return;
        }
        
        if (modalAction === 'add') {
            // Add to local data
            const newRowIndex = Math.max(...currentGroupData.students.map(s => s.rowIndex), 19) + 1;
            currentGroupData.students.push({ rowIndex: newRowIndex, name: name, phone: phone, notes: '' });
            showToast(`✅ Added ${name}`, 'success');
            renderAttendanceTable();
            updateStats();
        } else if (modalAction === 'edit' && selectedStudent) {
            const student = currentGroupData.students.find(s => s.rowIndex === selectedStudent.rowIndex);
            if (student) {
                student.name = name;
                student.phone = phone;
                showToast(`✅ Updated ${name}`, 'success');
                renderAttendanceTable();
            }
        }
        
        closeModal();
    }

    async function deleteStudent(groupName, rowIndex, studentName) {
        if (!confirm(`Delete ${studentName}? This cannot be undone.`)) return;
        
        const index = currentGroupData.students.findIndex(s => s.rowIndex === rowIndex);
        if (index !== -1) {
            currentGroupData.students.splice(index, 1);
            showToast(`🗑️ Deleted ${studentName}`, 'success');
            renderAttendanceTable();
            updateStats();
        }
    }

    async function sendAllNotifications() {
        if (!currentGroupData) return;
        showToast(`📨 Sent to ${currentGroupData.students.length} students`, 'success');
    }

    // ==================== HELPERS ====================
    function showToast(message, type) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        const colors = { success: '#10b981', error: '#ef4444', warning: '#f59e0b', info: '#3b82f6' };
        toast.style.background = colors[type] || colors.info;
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    function closeModal() {
        document.getElementById('studentModal').classList.remove('active');
    }

    // ==================== EVENT LISTENERS ====================
    document.querySelectorAll('.day-card').forEach(card => {
        card.addEventListener('click', () => selectDay(card.dataset.dayType));
    });

    document.getElementById('refreshBtn')?.addEventListener('click', () => {
        loadAllData();
        if (currentGroup) setTimeout(() => selectGroup(currentGroup), 500);
    });

    document.getElementById('sendAllNotificationsBtn')?.addEventListener('click', sendAllNotifications);
    document.getElementById('modalSaveBtn')?.addEventListener('click', saveStudent);
    document.getElementById('fabAddBtn')?.addEventListener('click', openAddModal);
    
    document.getElementById('studentModal')?.addEventListener('click', (e) => {
        if (e.target === document.getElementById('studentModal')) closeModal();
    });

    // Initialize
    loadAllData();
</script>
</body>
</html>
